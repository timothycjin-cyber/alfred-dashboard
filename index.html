<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f6; color: #1a1a1a; min-height: 100vh; padding-bottom: 105px; }

  .header { background: #fff; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e8e8e4; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 19px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  
  .month-select { font-size: 13px; padding: 5px 10px; border-radius: 8px; border: 1px solid #e8e8e4; background: #fff; color: #1a1a1a; cursor: pointer; font-weight: 600; outline: none; }
  
  .refresh-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #e8e8e4; background: transparent; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; padding: 0; outline: none; }
  .refresh-btn:hover { background: #f5f5f0; }

  .floating-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border-radius: 30px; display: flex; align-items: center; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100; width: 260px; height: 50px; }
  .nav-btn { flex: 1; border: none; background: transparent; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; height: 100%; z-index: 2; transition: color 0.3s ease; outline: none; -webkit-tap-highlight-color: transparent; }
  .nav-btn.active { color: #fff; }
  .nav-slider { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: rgba(255,255,255,0.15); border-radius: 25px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; pointer-events: none; }

  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }
  .view-section { display: none; }
  .view-section.active { display: block; }

  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; width: 100%; }
  @media (max-width: 480px) {
    .metric-grid.home-grid { grid-template-columns: repeat(2, 1fr); }
    .metric-grid.home-grid .balance-card { grid-column: span 2; }
    .metric-grid.analytics-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .metric { background: #fff; border-radius: 14px; padding: 1rem 0.75rem; border: 1px solid #e8e8e4; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 90px; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-val { font-size: 18px; font-weight: 700; white-space: nowrap; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 4px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #fff 0%, #faf9fc 60%, #f5f0ff 100%); border-color: #e1d8ff; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; width: 100%; justify-content: center; }
  @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; max-width: 480px; margin-left: auto; margin-right: auto; } }

  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.25rem; width: 100%; }
  .card-title { font-size: 12px; font-weight: 600; margin-bottom: 14px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 0.5px; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; font-weight: 500; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .cat-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .cat-name { font-size: 12px; color: #666; font-weight: 500; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #f2f2ee; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .cat-amt { font-size: 12px; font-weight: 600; width: 72px; text-align: right; flex-shrink: 0; }

  .date-group-header { font-size: 12px; font-weight: 700; color: #888; margin: 1.5rem 0 0.5rem 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .txn-list { border-radius: 14px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; margin-bottom: 0.5rem; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 1.25rem; border-bottom: 1px solid #f5f5f0; }
  .txn-row:last-child { border-bottom: none; }
  .txn-left { display: flex; align-items: center; gap: 12px; }
  
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; background: transparent; border-width: 1px; border-style: solid; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge.inc-badge { color: #1D9E75; border-color: #1D9E75; }
  .badge.exp-badge { color: #D4537E; border-color: #D4537E; }

  .txn-desc { font-size: 13.5px; font-weight: 600; color: #1a1a1a; }
  .txn-amt { font-size: 13.5px; font-weight: 700; }
  .txn-amt.income { color: #1D9E75; }
  .txn-amt.expense { color: #D4537E; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  @media (prefers-color-scheme: dark) {
    body { background: #141412; color: #e3e3df; }
    .header, .metric, .card, .txn-list, .month-select { background: #1e1e1c; border-color: #2c2c2a; color: #e3e3df; }
    .floating-nav { background: #262624; }
    .cat-bar-bg { background: #2c2c2a; }
    .txn-row { border-color: #2c2c2a; }
    .txn-desc, .card-title { color: #e3e3df; }
    .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #2b243d 0%, #1e1e1c 80%); border-color: #463b61; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title-row" style="display: flex; align-items: center; gap: 10px;">
      <div class="header-title">Project Alfred</div>
      <select id="month-select-element" class="month-select" onchange="handleMonthDropdown(this.value)"></select>
    </div>
  </div>
  <button class="refresh-btn" onclick="init()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 1 1 0 6M20.49 15a9 9 0 1 1 0-6"/>
    </svg>
  </button>
</div>

<div class="floating-nav">
  <div id="nav-slider" class="nav-slider"></div>
  <button class="nav-btn active" id="tab-home" onclick="switchView('home')">Home</button>
  <button class="nav-btn" id="tab-analytics" onclick="switchView('analytics')">Analytics</button>
</div>

<div class="container">
  <div id="main-loader" class="loading">
    <div class="spinner"></div>
    Reading your Google Sheet...
  </div>

  <div id="home-view" class="view-section">
    <div id="home-metrics" class="metric-grid home-grid"></div>
    <div id="home-timeline"></div>
  </div>

  <div id="analytics-view" class="view-section">
    <div id="analytics-metrics" class="metric-grid analytics-grid"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Cumulative Spend</div>
        <div style="position:relative; width:100%; height:200px">
          <canvas id="cumulative-line"></canvas>
        </div>
        <div class="custom-pill-legend" style="display:flex; gap:10px; justify-content:center; margin-top:10px">
          <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:#666; font-weight:600; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e4;">
            <div style="width:8px; height:8px; border-radius:50%; background:#FF6B6B"></div>This month
          </div>
          <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:#666; font-weight:600; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e4;">
            <div style="width:8px; height:8px; border-radius:50%; background:#b0bec5"></div>Last month
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div style="position:relative; width:100%; height:160px"><canvas id="donut"></canvas></div>
      </div>
    </div>
    <div class="card"><div class="card-title">Category Breakdown</div><div id="bar-breakdown"></div></div>
  </div>
</div>

<script>
const SHEET_ID = "19_C3gFlY7hDjGm87k3Uke63_Tgg6TQPl6xLiGZvuEis";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

const CAT_COLORS = {
  "Food & Dining":     { hex: "#FF6B6B", light: "#FFEAEA" },
  "Transport":         { hex: "#00BFA5", light: "#E0F2F1" },
  "Bills & Utilities": { hex: "#FFAB00", light: "#FFF3E0" },
  "Shopping":          { hex: "#2979FF", light: "#E3F2FD" },
  "Groceries":         { hex: "#AA00FF", light: "#F3E5F5" },
  "Entertainment":     { hex: "#FF3D00", light: "#FBE9E7" },
  "Other":             { hex: "#78909C", light: "#ECEFF1" }
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let allRows = [], activeMonth = new Date().getMonth(), activeYear = new Date().getFullYear(), currentView = 'home';
let donutChart = null, lineChart = null;

const centerTextPlugin = {
  id: 'centerText',
  afterDraw: (chart) => {
    if (chart.config.type !== 'doughnut') return;
    const { ctx, chartArea: { left, top, right, bottom } } = chart;
    const centerX = (left + right) / 2, centerY = (top + bottom) / 2;
    ctx.save();
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    ctx.font = '500 11px -apple-system, sans-serif';
    ctx.fillStyle = isDark ? '#aaa' : '#888';
    ctx.textAlign = 'center';
    ctx.fillText("Total", centerX, centerY - 10);
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.fillStyle = isDark ? '#e3e3df' : '#1a1a1a';
    ctx.fillText("RM " + chart.config.options.plugins.centerText.totalAmount.toFixed(2), centerX, centerY + 8);
    ctx.restore();
  }
};
Chart.register(centerTextPlugin);

async function init() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(", "").replace(");", ""));
    allRows = json.table.rows.filter(r => r.c[0]?.v && r.c[1]?.v).map(r => ({
        Date: r.c[0].v.replace("Date(", "").replace(")", "").split(",").map((v,i) => i===1 ? String(Number(v)+1).padStart(2,"0") : String(v).padStart(2,"0")).join("-"),
        Amount: Number(r.c[1].v),
        Category: r.c[2]?.v || "Other",
        Description: r.c[3]?.v || "",
        Type: r.c[5]?.v ? String(r.c[5].v).trim() : "Expense"
    }));
    document.getElementById('main-loader').style.display = 'none';
    renderDropdownOptions();
    switchView(currentView);
  } catch(e) { document.getElementById('main-loader').innerHTML = `⚠️ Connection Error: ${e.message}`; }
}

function switchView(view) {
  window.scrollTo(0, 0);
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${view}`).classList.add('active');
  document.getElementById(`${view}-view`).classList.add('active');
  document.getElementById('nav-slider').style.transform = (view === 'analytics') ? 'translateX(100%)' : 'translateX(0)';
  calculateAndRender();
}

function renderDropdownOptions() {
  const now = new Date();
  let html = '';
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    html += `<option value="${d.getFullYear()}-${d.getMonth()}" ${d.getMonth()===activeMonth ? 'selected':''}>${MONTHS[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  document.getElementById('month-select-element').innerHTML = html;
}

function handleMonthDropdown(val) {
  const [yr, mo] = val.split('-');
  activeYear = parseInt(yr); activeMonth = parseInt(mo);
  calculateAndRender();
}

function calculateAndRender() {
  const rows = allRows.filter(r => { const d = new Date(r.Date); return d.getMonth() === activeMonth && d.getFullYear() === activeYear; });
  const totalIncome = rows.filter(r => r.Type === "Income").reduce((s, r) => s + r.Amount, 0);
  const totalExpense = rows.filter(r => r.Type !== "Income").reduce((s, r) => s + r.Amount, 0);
  const netBalance = totalIncome - totalExpense;
  const expenseRows = rows.filter(r => r.Type !== "Income");
  const catTotals = {};
  expenseRows.forEach(r => { catTotals[r.Category] = (catTotals[r.Category] || 0) + r.Amount; });
  const catData = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const maxCat = catData[0]?.[1] || 1;

  if (currentView === 'home') {
    document.getElementById('home-metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Income</div><div class="metric-val" style="color:#1D9E75">RM ${totalIncome.toFixed(2)}</div></div>
      <div class="metric"><div class="metric-label">Expenses</div><div class="metric-val" style="color:#D4537E">RM ${totalExpense.toFixed(2)}</div></div>
      <div class="metric balance-card"><div class="metric-label">Net Balance</div><div class="metric-val" style="color:${netBalance>=0?'#1D9E75':'#D4537E'}">RM ${netBalance.toFixed(2)}</div></div>
    `;
    const sorted = [...rows].sort((a,b) => new Date(b.Date)-new Date(a.Date));
    const groups = {};
    sorted.forEach(r => { 
        const date = new Date(r.Date).toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
        if(!groups[date]) groups[date]=[]; groups[date].push(r); 
    });
    document.getElementById('home-timeline').innerHTML = Object.entries(groups).map(([d, items]) => `
      <div class="date-group-header">${d}</div>
      <div class="txn-list">${items.map(r => `
        <div class="txn-row">
          <div class="txn-left"><span class="badge ${r.Type==='Income'?'inc-badge':'exp-badge'}">${r.Type==='Income'?'Income':r.Category.split(' ')[0]}</span><div class="txn-desc">${r.Description}</div></div>
          <span class="txn-amt" style="color:${r.Type==='Income'?'#1D9E75':'#D4537E'}">${r.Type==='Income'?'+':''}RM ${r.Amount.toFixed(2)}</span>
        </div>`).join('')}</div>`).join('');
  } else {
    // Analytics view logic (charts)
    const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (donutChart) donutChart.destroy();
    if (catData.length) donutChart = new Chart(document.getElementById('donut'), {
      type: 'doughnut',
      data: { datasets: [{ data: catData.map(d => d[1]), backgroundColor: catData.map(([cat]) => CAT_COLORS[cat].hex), borderWidth: 0 }] },
      options: { plugins: { centerText: { totalAmount: totalExpense }, legend: { display: false } }, cutout: '72%' }
    });

    const isCurrent = (activeMonth === new Date().getMonth());
    const timelineLabels = Array.from({length: new Date(activeYear, activeMonth+1, 0).getDate()}, (_, i) => i+1);
    
    if (lineChart) lineChart.destroy();
    lineChart = new Chart(document.getElementById('cumulative-line'), {
      type: 'line',
      data: {
        labels: timelineLabels,
        datasets: [{ label: 'This Month', data: [], borderColor: '#FF6B6B', borderWidth: 3, pointRadius: 3, tension: 0.1 }]
      },
      options: {
        interaction: { mode: 'index', intersect: false }, // Snappy mobile sliding enabled
        scales: { x: { grid: { color: isDarkMode ? '#2c2c2a' : '#e8e8e4' } }, y: { grid: { color: isDarkMode ? '#2c2c2a' : '#e8e8e4' } } }
      }
    });
  }
}
init();
</script>
</body>
</html>
