<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* Soft, warm cream background and minimalist base font matching Money Mama */
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
    background: #f9f9f6; 
    color: #1a1a1a; 
    min-height: 100vh; 
    padding-bottom: 105px; 
  }

  /* Streamlined Header Zone */
  .header { 
    background: #fff; 
    padding: 1.25rem 1.5rem; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    position: sticky; 
    top: 0; 
    z-index: 10; 
    border-bottom: 1px solid #e8e8e4; 
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 19px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  
  /* Minimal Dropdown Styling */
  .month-select { 
    font-size: 13px; 
    padding: 5px 10px; 
    border-radius: 8px; 
    border: 1px solid #e8e8e4; 
    background: #fff; 
    color: #1a1a1a; 
    cursor: pointer; 
    font-weight: 600; 
    outline: none; 
  }
  
  /* Pixel-centered SVG refresh button */
  .refresh-btn { 
    width: 36px; 
    height: 36px; 
    border-radius: 50%; 
    border: 1px solid #e8e8e4; 
    background: transparent; 
    color: #555; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: background 0.2s; 
    padding: 0; 
    outline: none;
  }
  .refresh-btn:hover { background: #f5f5f0; }

  /* Floating Bottom Navigation Pill with snappy sliding slider mechanics */
  .floating-nav { 
    position: fixed; 
    bottom: 24px; 
    left: 50%; 
    transform: translateX(-50%); 
    background: #1a1a1a; 
    border-radius: 30px; 
    display: flex; 
    align-items: center; 
    padding: 4px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    z-index: 100; 
    width: 260px; 
    height: 50px; 
  }
  .nav-btn { 
    flex: 1; 
    border: none; 
    background: transparent; 
    color: #aaa; 
    font-size: 13px; 
    font-weight: 600; 
    cursor: pointer; 
    height: 100%; 
    z-index: 2; 
    transition: color 0.3s ease; 
    outline: none; 
    -webkit-tap-highlight-color: transparent; 
  }
  .nav-btn.active { color: #fff; }
  .nav-slider { 
    position: absolute; 
    top: 4px; 
    bottom: 4px; 
    left: 4px; 
    width: calc(50% - 4px); 
    background: rgba(255,255,255,0.15); 
    border-radius: 25px; 
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    z-index: 1; 
    pointer-events: none; 
  }

  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }
  .view-section { display: none; }
  .view-section.active { display: block; }

  /* Grid Layout: Optimized to fit row cards completely on one page */
  .metric-grid { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 8px; 
    margin-bottom: 1.5rem; 
    width: 100%; 
  }
  @media (max-width: 480px) {
    .metric-grid.home-grid { grid-template-columns: repeat(2, 1fr); }
    .metric-grid.home-grid .balance-card { grid-column: span 2; }
    .metric-grid.analytics-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .metric-grid.analytics-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  /* Highly Rounded Cards with Minimalist Geometry */
  .metric { 
    background: #fff; 
    border-radius: 14px; 
    padding: 0.75rem 0.5rem; 
    border: 1px solid #e8e8e4; 
    text-align: center; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    min-height: 80px; 
  }
  .metric-label { 
    font-size: 10px; 
    color: #888; 
    margin-bottom: 4px; 
    font-weight: 600; 
    text-transform: uppercase; 
    letter-spacing: 0.3px; 
  }
  .metric-val { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .metric-sub { 
    font-size: 9px; 
    color: #aaa; 
    margin-top: 3px; 
    font-weight: 500; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
  }

  @media (min-width: 360px) {
    .metric-val { font-size: 15px; }
    .metric-label { font-size: 11px; }
    .metric-sub { font-size: 10px; }
    .metric { padding: 1rem 0.5rem; min-height: 90px; }
  }
  @media (min-width: 400px) {
    .metric-val { font-size: 17px; }
  }

  /* Soft thematic analytics crystal ball gradient */
  .metric.crystal-ball { 
    background: radial-gradient(circle at 85% 15%, #fff 0%, #faf9fc 60%, #f5f0ff 100%); 
    border-color: #e1d8ff; 
  }

  /* Centered layouts for chart cards */
  .charts-row { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 16px; 
    margin-bottom: 1.5rem; 
    width: 100%; 
    justify-content: center; 
  }
  @media (max-width: 768px) { 
    .charts-row { 
      grid-template-columns: 1fr; 
      max-width: 480px; 
      margin: 0 auto 1.5rem auto; 
    } 
  }

  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.25rem; width: 100%; display: flex; flex-direction: column; }
  .card-title { font-size: 12px; font-weight: 600; margin-bottom: 14px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Custom Pill Shape Legendary Alignments */
  .custom-pill-legend { display: flex; gap: 12px; justify-content: center; margin-top: 10px; width: 100%; }
  .pill-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: #666; padding: 4px 14px; border-radius: 20px; border: 1px solid #e8e8e4; background: #fff; }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .legend-side-box { display: flex; flex-direction: column; gap: 8px; justify-content: center; margin-top: 12px; }
  @media (min-width: 480px) {
    .donut-layout { display: flex; align-items: center; gap: 14px; }
    .donut-container { flex: 1; }
    .legend-side-box { flex: 1; margin-top: 0; }
  }
  
  .legend-row-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 500; color: #555; }
  .legend-row-left { display: flex; align-items: center; gap: 6px; }

  .cat-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .cat-name { font-size: 12px; color: #666; font-weight: 500; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #f2f2ee; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .cat-amt { font-size: 12px; font-weight: 600; width: 72px; text-align: right; flex-shrink: 0; }

  /* Chronological Timeline Presentation */
  .date-group-header { font-size: 12px; font-weight: 700; color: #888; margin: 1.5rem 0 0.5rem 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .txn-list { border-radius: 14px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; margin-bottom: 0.5rem; }
  
  /* Compact and high-density timeline rows layout */
  .txn-row { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    padding: 10px 1.25rem; 
    border-bottom: 1px solid #f5f5f0; 
  }
  .txn-row:last-child { border-bottom: none; }
  
  .txn-left { display: flex; align-items: center; gap: 12px; }
  .txn-details { display: flex; flex-direction: column; gap: 2px; }
  .txn-badge-container { display: flex; margin-top: 1px; }

  /* Daily Spent Total Row Footer with left accent bar closer to "Spent" label */
  .txn-footer {
    background: #fafaf9;
    padding: 11px 1.25rem 11px 1.45rem; 
    position: relative; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 700;
    color: #666;
    border-top: 1px solid #f5f5f0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  /* Custom floating red vertical bar closer to text */
  .txn-footer::before {
    content: '';
    position: absolute;
    left: 10px; 
    top: 8px;   
    bottom: 8px;
    width: 4px;
    background-color: #FF6B6B; 
    border-radius: 3px; 
  }
  
  .txn-footer-amt {
    color: #FF6B6B; 
    font-size: 13.5px;
    font-weight: 800;
  }
  
  /* Balanced, highly stylized outlined semantic tags */
  .badge { font-size: 9px; padding: 1px 6px; border-radius: 5px; font-weight: 700; white-space: nowrap; background: transparent; border-width: 1px; border-style: solid; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge.inc-badge { color: #1D9E75; border-color: #1D9E75; }
  .badge.exp-badge { color: #FF6B6B; border-color: #FF6B6B; }
