<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding-bottom: 90px; }

  .header { background: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e8e8e4; }
  .header-left { display: flex; flex-direction: column; }
  .header-title-row { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 18px; font-weight: 600; }
  .header-sub { font-size: 13px; color: #666; margin-top: 2px; }
  .refresh-btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #333; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .refresh-btn:hover { background: #f5f5f0; }

  .month-select { font-size: 13px; padding: 4px 8px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; font-weight: 600; }

  /* Floating Bottom Navigation Pill */
  .floating-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(26, 26, 26, 0.96); backdrop-filter: blur(10px); border-radius: 30px; display: flex; align-items: center; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 100; width: 290px; border: 1px solid rgba(255,255,255,0.12); }
  .nav-half { flex: 1; background: none; border: none; color: #aaa; font-size: 13px; font-weight: 600; padding: 11px 0; cursor: pointer; text-align: center; border-radius: 25px; transition: all 0.2s ease; }
  .nav-half.active { color: #fff; background: rgba(255, 255, 255, 0.18); }
  .nav-divider { width: 1px; height: 20px; background: rgba(255, 255, 255, 0.2); }

  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }

  .view-section { display: none; }
  .view-section.active { display: block; }

  /* Grid Layout: No more horizontal scrolling, view all in one go */
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; width: 100%; }
  @media (max-width: 480px) {
    .metric-grid.home-grid { grid-template-columns: repeat(2, 1fr); }
    .metric-grid.home-grid .balance-card { grid-column: span 2; }
    .metric-grid.analytics-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .metric { background: #fff; border-radius: 12px; padding: 0.85rem 0.75rem; border: 1px solid #e8e8e4; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 85px; }
  .metric-label { font-size: 11px; color: #666; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-val { font-size: 17px; font-weight: 700; white-space: nowrap; }
  .metric-sub { font-size: 11px; color: #888; margin-top: 4px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Crystal Ball Layout Styling */
  .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #fff 0%, #faf8ff 50%, #f3edff 100%); border: 1px solid #d0c2ff; }

  /* Mobile-first centered chart configuration cards */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; width: 100%; justify-content: center; }
  @media (max-width: 768px) { 
    .charts-row { grid-template-columns: 1fr; max-width: 480px; margin-left: auto; margin-right: auto; } 
  }

  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.25rem; width: 100%; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: #333; text-transform: uppercase; letter-spacing: 0.3px; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; font-weight: 500; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .cat-row { display: flex; align-items: center; gap: 8px; }
  .cat-name { font-size: 12px; color: #555; font-weight: 500; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-bg { flex: 1; height: 8px; border-radius: 4px; background: #eef0eb; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .cat-amt { font-size: 12px; font-weight: 600; width: 72px; text-align: right; flex-shrink: 0; }

  /* Timelines Structure */
  .date-group-header { font-size: 12px; font-weight: 700; color: #444; margin: 1.5rem 0 0.5rem 0.25rem; text-transform: uppercase; letter-spacing: 0.6px; }
  .txn-list { border-radius: 14px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; margin-bottom: 0.5rem; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 1.25rem; border-bottom: 1px solid #f0f0ec; }
  .txn-row:last-child { border-bottom: none; }
  .txn-left { display: flex; align-items: center; gap: 12px; }
  
  /* Vibrant Outlined Badges */
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 6px; font-weight: 600; white-space: nowrap; background: transparent; border-width: 1.5px; border-style: solid; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge.inc-badge { color: #00C853; border-color: #00C853; }
  .badge.exp-badge { color: #FF1744; border-color: #FF1744; }

  .txn-desc { font-size: 13.5px; font-weight: 600; color: #1a1a1a; }
  .txn-meta { font-size: 11px; color: #888; margin-top: 2px; font-weight: 500; }
  .txn-amt { font-size: 13.5px; font-weight: 700; }
  .txn-amt.income { color: #00C853; }
  .txn-amt.expense { color: #1a1a1a; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  @media (prefers-color-scheme: dark) {
    body { background: #121212; color: #e8e8e4; }
    .header, .metric, .card, .txn-list, .month-select { background: #1e1e1e; border-color: #2c2c2c; color: #e8e8e4; }
    .floating-nav { background: rgba(30, 30, 30, 0.96); }
    .cat-bar-bg { background: #2c2c2c; }
    .txn-row { border-color: #2c2c2c; }
    .date-group-header { color: #aaa; }
    .txn-desc { color: #e8e8e4; }
    .card-title { color: #e8e8e4; }
    .txn-amt.expense { color: #e8e8e4; }
    .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #2a2240 0%, #1e1e1e 80%); border-color: #4c3c75; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title-row">
      <div class="header-title">Project Alfred</div>
      <select id="month-select-element" class="month-select" onchange="handleMonthDropdown(this.value)"></select>
    </div>
    <div class="header-sub" id="header-sub">Parsing layout…</div>
  </div>
  <button class="refresh-btn" onclick="init()">↻ Refresh</button>
</div>

<!-- Floating Navigation Pill -->
<div class="floating-nav">
  <button class="nav-half active" id="tab-home" onclick="switchView('home')">🏠 Home</button>
  <div class="nav-divider"></div>
  <button class="nav-half" id="tab-analytics" onclick="switchView('analytics')">📈 Analytics</button>
</div>

<div class="container">
  <!-- Home Tab View Section -->
  <div id="home-view" class="view-section active">
    <div id="home-metrics"></div>
    <div id="home-timeline"></div>
  </div>

  <!-- Analytics Tab View Section -->
  <div id="analytics-view" class="view-section">
    <div id="analytics-metrics"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Cumulative Spend Timeline</div>
        <div style="position:relative; width:100%; height:240px">
          <canvas id="cumulative-line"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div class="legend" id="donut-legend"></div>
        <div style="position:relative; width:100%; height:180px">
          <canvas id="donut"></canvas>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top: 14px;">
      <div class="card-title">Category Breakdown</div>
      <div style="display:flex; flex-direction:column; gap:12px" id="bar-breakdown"></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "19_C3gFlY7hDjGm87k3Uke63_Tgg6TQPl6xLiGZvuEis";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

// Vibrant, punchy financial theme palette mapping
const CAT_COLORS = {
  "Food & Dining":     { hex: "#00E676", light: "#E8F5E9", text: "#1B5E20" },
  "Transport":         { hex: "#2979FF", light: "#E3F2FD", text: "#0D47A1" },
  "Bills & Utilities": { hex: "#FF9100", light: "#FFF3E0", text: "#E65100" },
  "Shopping":          { hex: "#F50057", light: "#FCE4EC", text: "#880E4F" },
  "Groceries":         { hex: "#651FFF", light: "#EDE7F6", text: "#4A148C" },
  "Entertainment":     { hex: "#FF3D00", light: "#FBE9E7", text: "#BF360C" },
  "Other":             { hex: "#78909C", light: "#ECEFF1", text: "#263238" }
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let allRows = [];
let activeMonth = new Date().getMonth();
let activeYear = new Date().getFullYear();
let currentView = 'home';

let donutChart = null;
let lineChart = null;

async function init() {
  document.getElementById('header-sub').textContent = "Loading…";
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(", "").replace(");", ""));
    allRows = json.table.rows
      .filter(r => r.c[0]?.v && r.c[1]?.v)
      .map(r => ({
        Date: r.c[0].v.replace("Date(", "").replace(")", "").split(",").map((v,i) => i===1 ? String(Number(v)+1).padStart(2,"0") : String(v).padStart(2,"0")).join("-"),
        Amount: Number(r.c[1].v),
        Category: r.c[2]?.v || "Other",
        Description: r.c[3]?.v || "",
        Source: r.c[4]?.v || "telegram",
        Type: r.c[5]?.v ? String(r.c[5].v).trim() : "Expense"
      }));
    renderDropdownOptions();
    calculateAndRender();
  } catch(e) {
    document.getElementById('home-view').innerHTML = `<div class="error-banner">⚠️ Failed to reach sheet. Matrix error.<br>Error: ${e.message}</div>`;
    document.getElementById('header-sub').textContent = "Connection fail";
  }
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-half').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  
  document.getElementById(`tab-${view}`).classList.add('active');
  document.getElementById(`${view}-view`).classList.add('active');
  
  calculateAndRender();
}

function renderDropdownOptions() {
  const now = new Date();
  let dropdownHtml = '';
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const valString = `${d.getFullYear()}-${d.getMonth()}`;
    const selected = (d.getMonth() === activeMonth && d.getFullYear() === activeYear) ? 'selected' : '';
    dropdownHtml += `<option value="${valString}" ${selected}>${MONTHS[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  document.getElementById('month-select-element').innerHTML = dropdownHtml;
}

function handleMonthDropdown(val) {
  const parts = val.split('-');
  activeYear = parseInt(parts[0]);
  activeMonth = parseInt(parts[1]);
  calculateAndRender();
}

function calculateAndRender() {
  document.getElementById('header-sub').textContent = `${allRows.length} transactions mapped`;

  const rows = allRows.filter(r => {
    const d = new Date(r.Date);
    return d.getMonth() === activeMonth && d.getFullYear() === activeYear;
  });

  const totalIncome = rows.filter(r => r.Type === "Income").reduce((s, r) => s + r.Amount, 0);
  const totalExpense = rows.filter(r => r.Type !== "Income").reduce((s, r) => s + r.Amount, 0);
  const netBalance = totalIncome - totalExpense;

  const expenseRows = rows.filter(r => r.Type !== "Income");
  const catTotals = {};
  expenseRows.forEach(r => { catTotals[r.Category] = (catTotals[r.Category] || 0) + r.Amount; });
  const catData = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const maxCat = catData[0]?.[1] || 1;

  // ── HOME WORKSPACE BLOCK ──
  if (currentView === 'home') {
    const balanceCheekySub = netBalance >= 0 ? "In the green! 🎉" : "Watching the leak ⚠️";
    document.getElementById('home-metrics').innerHTML = `
      <div class="metric-grid home-grid">
        <div class="metric">
          <div class="metric-label">Income</div>
          <div class="metric-val" style="color: #00C853;">RM ${totalIncome.toFixed(2)}</div>
          <div class="metric-sub">${rows.filter(r => r.Type === "Income").length} items</div>
        </div>
        <div class="metric">
          <div class="metric-label">Expenses</div>
          <div class="metric-val" style="color: #FF1744;">RM ${totalExpense.toFixed(2)}</div>
          <div class="metric-sub">${expenseRows.length} items</div>
        </div>
        <div class="metric balance-card">
          <div class="metric-label">Net Balance</div>
          <div class="metric-val" style="color: ${netBalance >= 0 ? '#00C853' : '#FF1744'};">RM ${netBalance.toFixed(2)}</div>
          <div class="metric-sub">${balanceCheekySub}</div>
        </div>
      </div>
    `;

    if (!rows.length) {
      document.getElementById('home-timeline').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No records found this month.</div>';
    } else {
      const sortedRows = [...rows].sort((a, b) => new Date(b.Date) - new Date(a.Date));
      const groups = {};
      sortedRows.forEach(r => {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateHeader = new Date(r.Date).toLocaleDateString('en-US', options);
        if (!groups[dateHeader]) groups[dateHeader] = [];
        groups[dateHeader].push(r);
      });

      let timelineHtml = '';
      for (const [dateStr, records] of Object.entries(groups)) {
        timelineHtml += `<div class="date-group-header">${dateStr}</div><div class="txn-list">`;
        timelineHtml += records.map(r => {
          const isInc = r.Type === "Income";
          const displayTag = isInc ? 'Income' : r.Category.split(' ')[0];
          return `
            <div class="txn-row">
              <div class="txn-left">
                <span class="badge ${isInc ? 'inc-badge' : 'exp-badge'}">
                  ${displayTag}
                </span>
                <div>
                  <div class="txn-desc">${r.Description}</div>
                  <div class="txn-meta">via ${r.Source}</div>
                </div>
              </div>
              <span class="txn-amt ${isInc ? 'income' : 'expense'}" style="color: ${isInc ? '#00C853' : '#1a1a1a'}">
                ${isInc ? '+' : ''}RM ${r.Amount.toFixed(2)}
              </span>
            </div>
          `;
        }).join('');
        timelineHtml += `</div>`;
      }
      document.getElementById('home-timeline').innerHTML = timelineHtml;
    }
  }

  // ── ANALYTICS WORKSPACE BLOCK ──
  if (currentView === 'analytics') {
    const today = new Date();
    const daysInMonth = new Date(activeYear, activeMonth + 1, 0).getDate();
    const isCurrentMonth = (activeMonth === today.getMonth() && activeYear === today.getFullYear());
    const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;

    const dailyBurnRate = daysElapsed > 0 ? (totalExpense / daysElapsed) : 0;
    const projectedEndSpend = dailyBurnRate * daysInMonth;

    const burnCheekySub = dailyBurnRate > 100 ? "A bit of a splurge? 💸" : "Keeping it chill 🧊";

    // Replaced layout matrix with a clean 2-column side-by-side array
    document.getElementById('analytics-metrics').innerHTML = `
      <div class="metric-grid analytics-grid">
        <div class="metric">
          <div class="metric-label">Average Daily Spend</div>
          <div class="metric-val" style="color: #FF1744;">RM ${dailyBurnRate.toFixed(2)}/day</div>
          <div class="metric-sub">${burnCheekySub}</div>
        </div>
        <div class="metric crystal-ball">
          <div class="metric-label" style="color: #651FFF;">🔮 Forecasted Spend</div>
          <div class="metric-val" style="color: #4A148C;">RM ${projectedEndSpend.toFixed(2)}</div>
          <div class="metric-sub">Where you're landing 🛬</div>
        </div>
      </div>
    `;

    document.getElementById('donut-legend').innerHTML = catData.map(([cat, val]) => {
      const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
      const pct = totalExpense > 0 ? ((val / totalExpense) * 100).toFixed(0) : 0;
      return `<span class="legend-item"><span class="legend-dot" style="background:${c.hex}"></span>${cat.split(' ')[0]} ${pct}%</span>`;
    }).join('');

    document.getElementById('bar-breakdown').innerHTML = catData.length ? catData.map(([cat, val]) => {
      const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
      return `
        <div class="cat-row">
          <span class="cat-name">${cat}</span>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(val / maxCat * 100).toFixed(1)}%; background:${c.hex}"></div></div>
          <span class="cat-amt">RM ${val.toFixed(2)}</span>
        </div>
      `;
    }).join('') : '<div style="color:#aaa; font-size:13px; padding: 10px;">No breakdown fields found.</div>';

    if (donutChart) donutChart.destroy();
    if (catData.length) {
      donutChart = new Chart(document.getElementById('donut'), {
        type: 'doughnut',
        data: {
          labels: catData.map(d => d[0]),
          datasets: [{ data: catData.map(d => d[1]), backgroundColor: catData.map(([cat]) => (CAT_COLORS[cat] || CAT_COLORS["Other"]).hex), borderWidth: 2, borderColor: 'transparent' }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false } } }
      });
    }

    let lastMo = activeMonth - 1;
    let lastYr = activeYear;
    if (lastMo < 0) { lastMo = 11; lastYr -= 1; }

    const lastMonthExpenseRows = allRows.filter(r => {
      const d = new Date(r.Date);
      return d.getMonth() === lastMo && d.getFullYear() === lastYr && r.Type !== "Income";
    });

    const timelineLabels = Array.from({ length: daysInMonth }, (_, i) => i + 1);
    
    let currentSum = 0;
    const currentMonthlyCumulativeData = [];
    for (let day = 1; day <= daysInMonth; day++) {
      if (isCurrentMonth && day > today.getDate()) break;
      const dayExpenses = expenseRows.filter(r => new Date(r.Date).getDate() === day);
      currentSum += dayExpenses.reduce((s, r) => s + r.Amount, 0);
      currentMonthlyCumulativeData.push(currentSum);
    }

    let lastSum = 0;
    const priorMonthlyCumulativeData = [];
    const daysInLastMonth = new Date(lastYr, lastMo + 1, 0).getDate();
    for (let day = 1; day <= daysInMonth; day++) {
      if (day <= daysInLastMonth) {
        const dayExpenses = lastMonthExpenseRows.filter(r => new Date(r.Date).getDate() === day);
        lastSum += dayExpenses.reduce((s, r) => s + r.Amount, 0);
      }
      priorMonthlyCumulativeData.push(lastSum);
    }

    if (lineChart) lineChart.destroy();
    lineChart = new Chart(document.getElementById('cumulative-line'), {
      type: 'line',
      data: {
        labels: timelineLabels,
        datasets: [
          { label: 'This Month', data: currentMonthlyCumulativeData, borderColor: '#00C853', backgroundColor: 'transparent', borderWidth: 3, pointRadius: 2, tension: 0.1 },
          { label: 'Last Month', data: priorMonthlyCumulativeData, borderColor: '#b0bec5', backgroundColor: 'transparent', borderWidth: 2, borderDash: [6, 6], pointRadius: 0, tension: 0.1 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { boxWidth: 12, font: { size: 11, weight: 'bold' } } } },
        scales: {
          x: { grid: { display: false }, title: { display: true, text: 'Day of Month', font: { size: 10, weight: 'bold' } } },
          y: { beginAtZero: true, title: { display: true, text: 'Cumulative (RM)', font: { size: 10, weight: 'bold' } } }
        }
      }
    });
  }
}

init();
</script>
</body>
</html>
