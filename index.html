<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f6; color: #1a1a1a; min-height: 100vh; padding-bottom: 105px; }
  .header { background: #fff; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e8e8e4; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 19px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  .month-select { font-size: 13px; padding: 5px 10px; border-radius: 8px; border: 1px solid #e8e8e4; background: #fff; color: #1a1a1a; cursor: pointer; font-weight: 600; outline: none; }
  .refresh-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #e8e8e4; background: transparent; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; padding: 0; outline: none; }
  .refresh-btn:hover { background: #f5f5f0; }
  .floating-nav { position: fixed; bottom: 24px; left: 42%; transform: translateX(-50%); background: #1a1a1a; border-radius: 30px; display: flex; align-items: center; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; width: 210px; height: 50px; }
  .nav-btn { flex: 1; border: none; background: transparent; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; height: 100%; z-index: 2; transition: color 0.3s ease; outline: none; -webkit-tap-highlight-color: transparent; }
  .nav-btn.active { color: #fff; }
  .nav-slider { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: rgba(255,255,255,0.15); border-radius: 25px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; pointer-events: none; }
  .fab-btn { position: fixed; bottom: 24px; right: 24px; width: 50px; height: 50px; background: #FF6B6B; border-radius: 50%; border: none; color: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(255,107,107,0.4); cursor: pointer; z-index: 101; outline: none; transition: transform 0.2s ease; }
  .fab-btn:active { transform: scale(0.9); }
  .drawer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; opacity: 0; transition: opacity 0.3s ease; }
  .drawer-panel { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 1.5rem; z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 -10px 30px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; overflow-y: auto; max-height: 85vh; }
  .drawer-overlay.active { display: block; opacity: 1; }
  .drawer-panel.active { transform: translateY(0); }
  .drawer-header { font-size: 16px; font-weight: 700; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .drawer-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
  .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; }
  .form-input, .form-select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #e8e8e4; font-size: 14px; outline: none; background: #fafaf9; }
  .form-input:focus, .form-select:focus { border-color: #FF6B6B; background: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 1.25rem; }
  .btn-main { flex: 1; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-danger { flex: 1; padding: 12px; background: #fff; color: #FF6B6B; border: 1px solid #e8e8e4; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
  .toast-banner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.25); z-index: 500; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 8px; text-align: center; max-width: 90%; }
  .toast-banner.show { transform: translateX(-50%) translateY(0); }
  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }
  .view-section { display: none; }
  .view-section.active { display: block; }
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; width: 100%; }
  @media (max-width: 480px) { .metric-grid.home-grid { grid-template-columns: repeat(2, 1fr); } .metric-grid.home-grid .balance-card { grid-column: span 2; } .metric-grid.analytics-grid { grid-template-columns: repeat(2, 1fr); } }
  .metric { background: #fff; border-radius: 14px; padding: 0.75rem 0.5rem; border: 1px solid #e8e8e4; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 80px; }
  .metric-label { font-size: 10px; color: #888; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .metric-val { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .metric-sub { font-size: 9px; color: #aaa; margin-top: 3px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (min-width: 360px) { .metric-val { font-size: 15px; } .metric-label { font-size: 11px; } .metric-sub { font-size: 10px; } .metric { padding: 1rem 0.5rem; min-height: 90px; } }
  .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #fff 0%, #faf9fc 60%, #f5f0ff 100%); border-color: #e1d8ff; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; width: 100%; justify-content: center; }
  @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; max-width: 480px; margin: 0 auto 1.5rem auto; } }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.25rem; width: 100%; display: flex; flex-direction: column; }
  .card-title { font-size: 12px; font-weight: 600; margin-bottom: 14px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 0.5px; }
  .custom-pill-legend { display: flex; gap: 12px; justify-content: center; margin-top: 10px; width: 100%; }
  .legend-side-box { display: flex; flex-direction: column; gap: 8px; justify-content: center; margin-top: 12px; }
  @media (min-width: 480px) { .donut-layout { display: flex; align-items: center; gap: 14px; } .donut-container { flex: 1; } .legend-side-box { flex: 1; margin-top: 0; } }
  .legend-row-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 500; color: #555; }
  .legend-row-left { display: flex; align-items: center; gap: 6px; }
  .cat-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .cat-name { font-size: 12px; color: #666; font-weight: 500; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #f2f2ee; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .cat-amt { font-size: 12px; font-weight: 600; width: 72px; text-align: right; flex-shrink: 0; }
  .date-group-header { font-size: 12px; font-weight: 700; color: #888; margin: 1.5rem 0 0.5rem 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .txn-list { border-radius: 14px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; margin-bottom: 0.5rem; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 1.25rem; border-bottom: 1px solid #f5f5f0; cursor: pointer; transition: background 0.15s ease; }
  .txn-row:hover { background: #fafaf9; }
  .txn-row:last-child { border-bottom: none; }
  .txn-left { display: flex; align-items: center; gap: 12px; }
  .txn-details { display: flex; flex-direction: column; gap: 2px; }
  .txn-badge-container { display: flex; margin-top: 1px; }
  .txn-footer { background: #fafaf9; padding: 11px 1.25rem 11px 1.45rem; position: relative; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; color: #666; border-top: 1px solid #f5f5f0; text-transform: uppercase; letter-spacing: 0.5px; }
  /* FIX 4: Only show red bar when there are expenses that day */
  .txn-footer.has-expenses::before { content: ''; position: absolute; left: 10px; top: 8px; bottom: 8px; width: 4px; background-color: #FF6B6B; border-radius: 3px; }
  .txn-footer-amt { color: #FF6B6B; font-size: 13.5px; font-weight: 800; }
  .badge { font-size: 9px; padding: 1px 6px; border-radius: 5px; font-weight: 700; white-space: nowrap; background: transparent; border-width: 1px; border-style: solid; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge.inc-badge { color: #1D9E75; border-color: #1D9E75; }
  .badge.exp-badge { color: #FF6B6B; border-color: #FF6B6B; }
  .txn-desc { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1.25; }
  .txn-amt { font-size: 13px; font-weight: 700; }
  .txn-amt.income { color: #1D9E75; }
  .txn-amt.expense { color: #FF6B6B; }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 1rem; color: #888; font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 3px solid #e8e8e4; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-color-scheme: dark) {
    body { background: #141412; color: #e3e3df; }
    .header, .metric, .card, .txn-list, .month-select, .drawer-panel { background: #1e1e1c; border-color: #2c2c2a; color: #e3e3df; }
    .floating-nav { background: #262624; }
    .cat-bar-bg, .form-input, .form-select { background: #2c2c2a; border-color: #3d3d3a; color: #e3e3df; }
    .txn-row { border-color: #2c2c2a; }
    .txn-row:hover { background: #232321; }
    .txn-footer { background: #252523; border-top-color: #2c2c2a; color: #aaa; }
    .txn-desc, .card-title { color: #e3e3df; }
    .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #2b243d 0%, #1e1e1c 80%); border-color: #463b61; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title-row" style="display: flex; align-items: center; gap: 10px;">
      <div class="header-title">Project Alfred</div>
      <select id="month-select-element" class="month-select" onchange="handleMonthDropdown(this.value)"></select>
    </div>
  </div>
  <button class="refresh-btn" onclick="init()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 1 1 0 6M20.49 15a9 9 0 1 1 0-6"/>
    </svg>
  </button>
</div>

<div id="toast" class="toast-banner"></div>

<button class="fab-btn" onclick="openAddDrawer()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
  </svg>
</button>

<div class="floating-nav">
  <div id="nav-slider" class="nav-slider"></div>
  <button class="nav-btn active" id="tab-home" onclick="switchView('home')">Home</button>
  <button class="nav-btn" id="tab-analytics" onclick="switchView('analytics')">Analytics</button>
</div>

<!-- Add Transaction Drawer -->
<div id="add-drawer-overlay" class="drawer-overlay" onclick="closeAddDrawer()"></div>
<div id="add-drawer-panel" class="drawer-panel">
  <div class="drawer-header">
    <span>Quick Add Transaction</span>
    <button class="drawer-close" onclick="closeAddDrawer()">×</button>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
    <div class="form-group">
      <label class="form-label">Amount (RM)</label>
      <input type="number" step="0.01" id="manual-amount" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select id="manual-type" class="form-select">
        <option value="Expense">Expense</option>
        <option value="Income">Income</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Description</label>
    <input type="text" id="manual-desc" class="form-input" placeholder="e.g. Lunch with team">
  </div>
  <div class="form-group">
    <label class="form-label">Category</label>
    <select id="manual-category" class="form-select">
      <option value="Food & Dining">Food & Dining</option>
      <option value="Transport">Transport</option>
      <option value="Bills & Utilities">Bills & Utilities</option>
      <option value="Shopping">Shopping</option>
      <option value="Groceries">Groceries</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <!-- FIX 2: Date field for correct local timezone logging -->
  <div class="form-group">
    <label class="form-label">Date</label>
    <input type="date" id="manual-date" class="form-input">
  </div>
  <div class="btn-row">
    <button id="add-submit-btn" class="btn-main" onclick="submitAddTransaction()">Save Entry</button>
  </div>
</div>

<!-- Edit/Delete Drawer -->
<div id="edit-drawer-overlay" class="drawer-overlay" onclick="closeEditDrawer()"></div>
<div id="edit-drawer-panel" class="drawer-panel">
  <div class="drawer-header">
    <span>Manage Entry</span>
    <button class="drawer-close" onclick="closeEditDrawer()">×</button>
  </div>
  <input type="hidden" id="edit-orig-date">
  <input type="hidden" id="edit-orig-amt">
  <input type="hidden" id="edit-orig-cat">
  <input type="hidden" id="edit-orig-desc">
  <input type="hidden" id="edit-orig-type">

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div class="form-group">
      <label class="form-label">Amount (RM)</label>
      <input type="number" step="0.01" id="edit-amount" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select id="edit-type" class="form-select">
        <option value="Expense">Expense</option>
        <option value="Income">Income</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Description</label>
    <input type="text" id="edit-desc" class="form-input">
  </div>
  <div class="form-group">
    <label class="form-label">Category</label>
    <select id="edit-category" class="form-select">
      <option value="Food & Dining">Food & Dining</option>
      <option value="Transport">Transport</option>
      <option value="Bills & Utilities">Bills & Utilities</option>
      <option value="Shopping">Shopping</option>
      <option value="Groceries">Groceries</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <!-- FIX 3: Renamed label from "Date Offset" to "Date" -->
  <div class="form-group">
    <label class="form-label">Date</label>
    <input type="date" id="edit-date" class="form-input">
  </div>
  <div class="btn-row">
    <button id="delete-btn" class="btn-danger" onclick="executeDelete()">Delete</button>
    <button class="btn-main" onclick="executeUpdate()">Save Changes</button>
  </div>
</div>

<div class="container">
  <div id="main-loader" class="loading">
    <div class="spinner"></div>
    Reading your Google Sheet...
  </div>

  <div id="home-view" class="view-section">
    <div id="home-metrics" class="metric-grid home-grid"></div>
    <div id="home-timeline"></div>
  </div>

  <div id="analytics-view" class="view-section">
    <div id="analytics-metrics" class="metric-grid analytics-grid"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Cumulative Spend</div>
        <div id="cumulative-line-container" style="position:relative; width:100%; height:200px">
          <canvas id="cumulative-line"></canvas>
        </div>
        <div class="custom-pill-legend" style="display:flex; gap:10px; justify-content:center; margin-top:10px">
          <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:#666; font-weight:600; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e4;">
            <div style="width:8px; height:8px; border-radius:50%; background:#FF6B6B"></div>This month
          </div>
          <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:#666; font-weight:600; padding:4px 12px; border-radius:20px; border:1px solid #e8e8e4;">
            <div style="width:8px; height:8px; border-radius:50%; background:#b0bec5"></div>Last month
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div class="donut-layout">
          <div id="donut-container" class="donut-container" style="position:relative; width:100%; height:160px">
            <canvas id="donut"></canvas>
          </div>
          <div class="legend-side-box" id="donut-legend-rows"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Category Breakdown</div>
      <div style="display:flex; flex-direction:column; gap:12px" id="bar-breakdown"></div>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwAtrD-a9qht6e_yvzhawAdhNHY73e9Tbuj2Jsmi6YmjlRiAauop2r9rVe71wLBW9Hj/exec";
const SHEET_ID = "19_C3gFlY7hDjGm87k3Uke63_Tgg6TQPl6xLiGZvuEis";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

const CAT_COLORS = {
  "Food & Dining":     { hex: "#FF6B6B", light: "#FFEAEA", text: "#D32F2F" },
  "Transport":         { hex: "#00BFA5", light: "#E0F2F1", text: "#004D40" },
  "Bills & Utilities": { hex: "#FFAB00", light: "#FFF8E1", text: "#FF6D00" },
  "Shopping":          { hex: "#2979FF", light: "#E3F2FD", text: "#0D47A1" },
  "Groceries":         { hex: "#AA00FF", light: "#F3E5F5", text: "#4A148C" },
  "Entertainment":     { hex: "#FF3D00", light: "#FBE9E7", text: "#BF360C" },
  "Other":             { hex: "#78909C", light: "#ECEFF1", text: "#263238" }
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let allRows = [];
let activeMonth = new Date().getMonth();
let activeYear = new Date().getFullYear();
let currentView = 'home';
let donutChart = null, lineChart = null;
let deleteConfirmActive = false;

// Lookup map: index → row object. Populated during render, used by event delegation.
// Avoids passing data through onclick string interpolation (breaks on quotes, ampersands, etc.)
let rowLookup = {};

// FIX 2: Get today's date in LOCAL timezone (not UTC)
function getLocalDateString() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatCurrency(num) {
  return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showToast(message, isError = false) {
  const toast = document.getElementById('toast');
  toast.innerText = message;
  toast.style.background = isError ? '#FF6B6B' : '#1a1a1a';
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); }, 4500);
}

Chart.Tooltip.positioners.thisMonthOnly = function(elements) {
  if (!elements || elements.length === 0) return false;
  const target = elements.find(el => el.datasetIndex === 0);
  if (target && target.element) return { x: target.element.x, y: target.element.y };
  const first = elements[0];
  if (first && first.element) return { x: first.element.x, y: first.element.y };
  return false;
};

const centerTextPlugin = {
  id: 'centerText',
  afterDraw: (chart) => {
    if (chart.config.type !== 'doughnut') return;
    const { ctx, chartArea: { left, top, right, bottom } } = chart;
    const centerX = (left + right) / 2, centerY = (top + bottom) / 2;
    ctx.save();
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    ctx.font = '500 11px -apple-system, sans-serif';
    ctx.fillStyle = isDark ? '#aaa' : '#888';
    ctx.textAlign = 'center';
    ctx.fillText("Total", centerX, centerY - 10);
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.fillStyle = isDark ? '#e3e3df' : '#1a1a1a';
    ctx.fillText("RM " + formatCurrency(chart.config.options.plugins.centerText.totalAmount), centerX, centerY + 8);
    ctx.restore();
  }
};
Chart.register(centerTextPlugin);

// Correctly parses gviz date strings like "Date(2026,5,27)" → "2026-06-27"
// Month is 0-indexed in gviz. Year must NOT be padded (was the bug causing row-match failures).
// Handles all date formats gviz returns depending on how the date was stored:
// 1. "Date(2026,5,27)"  — gviz serial for dates stored as actual Date type
// 2. "2026-06-14"       — ISO string (older Telegram bot rows)
// 3. "6/27/2026 8:00:00" or "6/27/2026" — US format (FAB-added rows)
function parseGvizDate(raw) {
  try {
    const s = String(raw).trim();

    // Format 1: gviz Date() serial
    if (s.startsWith("Date(")) {
      const parts = s.replace("Date(", "").replace(")", "").split(",");
      const year  = parts[0].trim();
      const month = String(Number(parts[1].trim()) + 1).padStart(2, "0");
      const day   = String(Number(parts[2].trim())).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    // Format 2: already ISO "2026-06-14" (possibly with time suffix)
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
      return s.substring(0, 10);
    }

    // Format 3: US format "6/27/2026" or "6/27/2026 8:00:00"
    if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)) {
      const datePart = s.split(" ")[0];
      const [m, d, y] = datePart.split("/");
      return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
    }

    console.warn("Unrecognised date format:", s);
    return s.substring(0, 10);
  } catch(e) {
    console.error("parseGvizDate failed for:", raw, e.message);
    return "1970-01-01";
  }
}

async function init() {
  document.getElementById('main-loader').style.display = 'flex';
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(", "").replace(");", ""));
    allRows = [];
    json.table.rows.forEach((r, i) => {
      try {
        if (!r.c[0]?.v || !r.c[1]?.v) return; // skip empty rows
        allRows.push({
          Date: parseGvizDate(r.c[0].v),
          Amount: Number(r.c[1].v),
          Category: r.c[2]?.v != null ? String(r.c[2].v).trim() : "Other",
          Description: r.c[3]?.v != null ? String(r.c[3].v).trim() : "",
          Type: r.c[5]?.v != null ? String(r.c[5].v).trim() : "Expense"
        });
      } catch(rowErr) {
        console.error(`Row ${i} parse failed:`, rowErr.message, JSON.stringify(r.c));
      }
    });
    document.getElementById('main-loader').style.display = 'none';
    renderDropdownOptions();
    switchView(currentView);
  } catch(e) {
    console.error("init() failed:", e);
    document.getElementById('main-loader').innerHTML = `⚠️ Connection interrupted: ${e.message}<br><small style="color:#aaa;font-size:11px;">Check browser console (F12) for row details.</small>`;
  }
}

function switchView(view) {
  window.scrollTo(0, 0);
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${view}`).classList.add('active');
  document.getElementById(`${view}-view`).classList.add('active');
  document.getElementById('nav-slider').style.transform = (view === 'analytics') ? 'translateX(100%)' : 'translateX(0)';
  calculateAndRender();
}

function renderDropdownOptions() {
  const now = new Date();
  let dropdownHtml = '';
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const valString = `${d.getFullYear()}-${d.getMonth()}`;
    dropdownHtml += `<option value="${valString}" ${d.getMonth()===activeMonth && d.getFullYear()===activeYear ? 'selected' : ''}>${MONTHS[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  document.getElementById('month-select-element').innerHTML = dropdownHtml;
}

function handleMonthDropdown(val) {
  const parts = val.split('-');
  activeYear = parseInt(parts[0]); activeMonth = parseInt(parts[1]);
  calculateAndRender();
}

function openAddDrawer() {
  // FIX 2: Pre-fill date with correct local date
  document.getElementById('manual-date').value = getLocalDateString();
  document.getElementById('add-drawer-overlay').classList.add('active');
  document.getElementById('add-drawer-panel').classList.add('active');
}
function closeAddDrawer() {
  document.getElementById('add-drawer-overlay').classList.remove('active');
  document.getElementById('add-drawer-panel').classList.remove('active');
  document.getElementById('manual-amount').value = "";
  document.getElementById('manual-desc').value = "";
}

function openEditDrawer(date, amount, category, description, type) {
  document.getElementById('edit-orig-date').value = date;
  document.getElementById('edit-orig-amt').value = amount;
  document.getElementById('edit-orig-cat').value = category;
  document.getElementById('edit-orig-desc').value = description;
  document.getElementById('edit-orig-type').value = type;
  document.getElementById('edit-amount').value = amount;
  document.getElementById('edit-type').value = type;
  document.getElementById('edit-desc').value = description;
  document.getElementById('edit-category').value = category;
  document.getElementById('edit-date').value = date;
  deleteConfirmActive = false;
  const deleteBtn = document.getElementById('delete-btn');
  deleteBtn.innerText = "Delete";
  deleteBtn.style.background = "#fff";
  deleteBtn.style.color = "#FF6B6B";
  document.getElementById('edit-drawer-overlay').classList.add('active');
  document.getElementById('edit-drawer-panel').classList.add('active');
}
function closeEditDrawer() {
  document.getElementById('edit-drawer-overlay').classList.remove('active');
  document.getElementById('edit-drawer-panel').classList.remove('active');
}

async function submitAddTransaction() {
  const payload = {
    action: "add",
    amount: parseFloat(document.getElementById('manual-amount').value),
    type: document.getElementById('manual-type').value,
    description: document.getElementById('manual-desc').value.trim(),
    category: document.getElementById('manual-category').value,
    // FIX 2: Use the user-selected local date field instead of UTC ISO string
    date: document.getElementById('manual-date').value
  };
  if (isNaN(payload.amount) || !payload.description) {
    showToast("Please fill in both description and amount.", true);
    return;
  }
  closeAddDrawer();
  executeWebhookTransaction(payload);
}

function executeDelete() {
  const deleteBtn = document.getElementById('delete-btn');
  if (!deleteConfirmActive) {
    deleteConfirmActive = true;
    deleteBtn.innerText = "Confirm Delete?";
    deleteBtn.style.background = "#FF6B6B";
    deleteBtn.style.color = "#fff";
    setTimeout(() => {
      if (deleteConfirmActive) {
        deleteConfirmActive = false;
        deleteBtn.innerText = "Delete";
        deleteBtn.style.background = "#fff";
        deleteBtn.style.color = "#FF6B6B";
      }
    }, 3500);
    return;
  }
  deleteConfirmActive = false;
  const payload = {
    action: "delete",
    oldData: {
      date: document.getElementById('edit-orig-date').value,
      amount: parseFloat(document.getElementById('edit-orig-amt').value),
      category: document.getElementById('edit-orig-cat').value,
      description: document.getElementById('edit-orig-desc').value
    }
  };
  closeEditDrawer();
  executeWebhookTransaction(payload);
}

function executeUpdate() {
  const payload = {
    action: "update",
    oldData: {
      date: document.getElementById('edit-orig-date').value,
      amount: parseFloat(document.getElementById('edit-orig-amt').value),
      category: document.getElementById('edit-orig-cat').value,
      description: document.getElementById('edit-orig-desc').value
    },
    newData: {
      date: document.getElementById('edit-date').value,
      amount: parseFloat(document.getElementById('edit-amount').value),
      type: document.getElementById('edit-type').value,
      description: document.getElementById('edit-desc').value.trim(),
      category: document.getElementById('edit-category').value
    }
  };
  closeEditDrawer();
  executeWebhookTransaction(payload);
}

// FIX 1: CORS-safe fire-and-forget with no-cors, then poll for confirmation
async function executeWebhookTransaction(payload) {
  if (APPS_SCRIPT_WEBHOOK_URL.includes("YOUR_APPS_SCRIPT")) {
    showToast("Web app URL missing! Check console.", true);
    console.log("Mock payload:", payload);
    return;
  }

  document.getElementById('main-loader').style.display = 'flex';
  showToast("Saving to sheet...");

  try {
    // Apps Script doesn't return CORS headers on POST, so we use no-cors.
    // This means we can't read the response — we fire and wait, then re-poll the sheet.
    await fetch(APPS_SCRIPT_WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain; charset=utf-8" },
      body: JSON.stringify(payload)
    });
  } catch(e) {
    // no-cors fetches rarely throw, but handle just in case
    console.warn("Fetch warning (may be benign with no-cors):", e.message);
  }

  // Poll the sheet after a short delay to confirm the write landed
  // Apps Script webhooks are async under the hood — 2.5s gives it time to settle
  setTimeout(async () => {
    try {
      await init();
      showToast("✓ Sheet updated.");
    } catch(e) {
      showToast("Saved, but couldn't refresh — tap ↻ to reload.", false);
      document.getElementById('main-loader').style.display = 'none';
    }
  }, 2500);
}

function calculateAndRender() {
  const rows = allRows.filter(r => {
    const d = new Date(r.Date);
    return d.getMonth() === activeMonth && d.getFullYear() === activeYear;
  });

  const totalIncome = rows.filter(r => r.Type === "Income").reduce((s, r) => s + r.Amount, 0);
  const totalExpense = rows.filter(r => r.Type !== "Income").reduce((s, r) => s + r.Amount, 0);
  const netBalance = totalIncome - totalExpense;
  const expenseRows = rows.filter(r => r.Type !== "Income");
  const catTotals = {};
  expenseRows.forEach(r => { catTotals[r.Category] = (catTotals[r.Category] || 0) + r.Amount; });
  const catData = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const maxCat = catData[0]?.[1] || 1;

  if (currentView === 'home') {
    document.getElementById('home-metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Income</div><div class="metric-val" style="color:#1D9E75;">RM ${formatCurrency(totalIncome)}</div></div>
      <div class="metric"><div class="metric-label">Expenses</div><div class="metric-val" style="color:#FF6B6B;">RM ${formatCurrency(totalExpense)}</div></div>
      <div class="metric balance-card"><div class="metric-label">Net Balance</div><div class="metric-val" style="color:${netBalance >= 0 ? '#1D9E75' : '#FF6B6B'};">RM ${formatCurrency(netBalance)}</div></div>
    `;

    if (!rows.length) {
      document.getElementById('home-timeline').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No records found this month.</div>';
    } else {
      const sortedRows = [...rows].sort((a, b) => new Date(b.Date) - new Date(a.Date));
      const groups = {};
      sortedRows.forEach(r => {
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        const dateHeader = new Date(r.Date).toLocaleDateString('en-US', options);
        if (!groups[dateHeader]) groups[dateHeader] = [];
        groups[dateHeader].push(r);
      });

      rowLookup = {};
      let rowIdx = 0;
      let timelineHtml = '';
      for (const [dateStr, records] of Object.entries(groups)) {
        // FIX 4: Only compute expense total and conditionally apply the red bar class
        const dayExpensesTotal = records.filter(r => r.Type !== 'Income').reduce((sum, r) => sum + r.Amount, 0);
        const hasExpenses = dayExpensesTotal > 0;

        timelineHtml += `<div class="date-group-header">${dateStr}</div><div class="txn-list">`;
        timelineHtml += records.map(r => {
          const isInc = r.Type === "Income";
          const idx = rowIdx++;
          // Store full row object in lookup — safe against any special chars in description
          rowLookup[idx] = r;
          return `
            <div class="txn-row" data-idx="${idx}">
              <div class="txn-left">
                <div class="txn-details">
                  <div class="txn-desc">${r.Description.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                  <div class="txn-badge-container"><span class="badge ${isInc ? 'inc-badge' : 'exp-badge'}">${isInc ? 'Income' : r.Category.split(' ')[0]}</span></div>
                </div>
              </div>
              <span class="txn-amt ${isInc ? 'income' : 'expense'}">${isInc ? '+' : ''}RM ${formatCurrency(r.Amount)}</span>
            </div>
          `;
        }).join('');
        // FIX 4: Conditionally show footer and red bar only when there are expenses
        if (hasExpenses) {
          timelineHtml += `<div class="txn-footer has-expenses"><span>Spent this day</span><span class="txn-footer-amt">RM ${formatCurrency(dayExpensesTotal)}</span></div>`;
        }
        timelineHtml += `</div>`;
      }
      document.getElementById('home-timeline').innerHTML = timelineHtml;
    }
  }

  if (currentView === 'analytics') {
    const today = new Date();
    const daysInMonth = new Date(activeYear, activeMonth + 1, 0).getDate();
    const isCurrentMonth = (activeMonth === today.getMonth() && activeYear === today.getFullYear());
    const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;
    const dailyBurnRate = daysElapsed > 0 ? (totalExpense / daysElapsed) : 0;
    const projectedEndSpend = dailyBurnRate * daysInMonth;

    document.getElementById('analytics-metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Average Daily Spend</div><div class="metric-val" style="color:#FF6B6B;">RM ${formatCurrency(dailyBurnRate)}/day</div></div>
      <div class="metric crystal-ball"><div class="metric-label" style="color:#7F77DD;">🔮 Forecasted Spend</div><div class="metric-val" style="color:#534AB7;">RM ${formatCurrency(projectedEndSpend)}</div></div>
    `;

    document.getElementById('donut-legend-rows').innerHTML = catData.map(([cat, val]) => {
      const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
      return `<div class="legend-row-item"><div class="legend-row-left"><span class="legend-dot" style="background:${c.hex}"></span>${cat.split(' ')[0]}</div><div>${totalExpense>0?((val/totalExpense)*100).toFixed(0):0}%</div></div>`;
    }).join('');

    document.getElementById('bar-breakdown').innerHTML = catData.length ? catData.map(([cat, val]) => {
      const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
      return `<div class="cat-row"><span class="cat-name">${cat}</span><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(val/maxCat*100).toFixed(1)}%; background:${c.hex}"></div></div><span class="cat-amt">RM ${formatCurrency(val)}</span></div>`;
    }).join('') : '<div style="color:#aaa; font-size:13px; padding:10px 0;">No logs mapped.</div>';

    const donutContainer = document.getElementById('donut-container');
    if (donutContainer) donutContainer.innerHTML = '<canvas id="donut"></canvas>';
    if (donutChart) donutChart.destroy();
    if (catData.length) {
      donutChart = new Chart(document.getElementById('donut'), {
        type: 'doughnut',
        data: { datasets: [{ data: catData.map(d => d[1]), backgroundColor: catData.map(([cat]) => (CAT_COLORS[cat]||CAT_COLORS["Other"]).hex), borderWidth: 2, borderColor: '#fff' }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '72%', plugins: { legend: { display: false }, centerText: { totalAmount: totalExpense } } }
      });
    }

    const lineContainer = document.getElementById('cumulative-line-container');
    if (lineContainer) lineContainer.innerHTML = '<canvas id="cumulative-line"></canvas>';
    const lineCanvas = document.getElementById('cumulative-line');

    let lastMo = activeMonth - 1, lastYr = activeYear; if (lastMo < 0) { lastMo = 11; lastYr -= 1; }
    const lastMonthExpenseRows = allRows.filter(r => { const d = new Date(r.Date); return d.getMonth() === lastMo && d.getFullYear() === lastYr && r.Type !== "Income"; });
    const timelineLabels = Array.from({ length: daysInMonth }, (_, i) => i + 1);

    let currentSum = 0; const currentMonthlyCumulativeData = [];
    for (let day = 1; day <= daysInMonth; day++) {
      if (isCurrentMonth && day > today.getDate()) break;
      currentSum += expenseRows.filter(r => new Date(r.Date).getDate() === day).reduce((s, r) => s + r.Amount, 0);
      currentMonthlyCumulativeData.push(currentSum);
    }

    let lastSum = 0; const priorMonthlyCumulativeData = [];
    const daysInLastMonth = new Date(lastYr, lastMo + 1, 0).getDate();
    for (let day = 1; day <= daysInMonth; day++) {
      if (day <= daysInLastMonth) lastSum += lastMonthExpenseRows.filter(r => new Date(r.Date).getDate() === day).reduce((s, r) => s + r.Amount, 0);
      priorMonthlyCumulativeData.push(lastSum);
    }

    const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (lineChart) lineChart.destroy();
    lineChart = new Chart(lineCanvas, {
      type: 'line',
      data: {
        labels: timelineLabels,
        datasets: [
          { label: 'This Month', data: currentMonthlyCumulativeData, borderColor: '#FF6B6B', backgroundColor: 'transparent', borderWidth: 3, pointRadius: 3, pointHoverRadius: 6, pointBackgroundColor: '#fff', pointBorderColor: '#FF6B6B', pointBorderWidth: 2, tension: 0.1 },
          { label: 'Last Month', data: priorMonthlyCumulativeData, borderColor: '#b0bec5', backgroundColor: 'transparent', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, tension: 0.1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: true, position: 'thisMonthOnly', intersect: false, filter: (item) => item.datasetIndex === 0 } },
        interaction: { mode: 'index', intersect: false },
        scales: { x: { grid: { color: isDarkMode ? '#2c2c2a' : '#e8e8e4', lineWidth: 0.5 }, ticks: { color: isDarkMode ? '#aaa' : '#888', font: { size: 10 } } }, y: { beginAtZero: true, grid: { color: isDarkMode ? '#2c2c2a' : '#e8e8e4', lineWidth: 0.5 }, ticks: { color: isDarkMode ? '#aaa' : '#888', font: { size: 10 }, callback: (v) => v.toLocaleString('en-US') } } }
      }
    });

    const dismissTooltip = () => { if (lineChart) { lineChart.setActiveElements([]); if (lineChart.tooltip) lineChart.tooltip.setActiveElements([], {}); lineChart.update('none'); } };
    lineCanvas.addEventListener('touchend', dismissTooltip); lineCanvas.addEventListener('touchcancel', dismissTooltip); lineCanvas.addEventListener('mouseleave', dismissTooltip);
  }
}

// Event delegation: single listener on the timeline container handles all row clicks.
// Safe against any content in description — no string interpolation in onclick.
document.getElementById('home-timeline').addEventListener('click', function(e) {
  const row = e.target.closest('.txn-row[data-idx]');
  if (!row) return;
  const idx = parseInt(row.dataset.idx, 10);
  const r = rowLookup[idx];
  if (!r) return;
  openEditDrawer(r.Date, r.Amount, r.Category, r.Description, r.Type);
});

init();
</script>
