<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f6; color: #1a1a1a; min-height: 100vh; padding-bottom: 100px; }

  /* Header */
  .header { background: #fff; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e8e8e4; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 19px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  .month-select { font-size: 13px; padding: 5px 10px; border-radius: 8px; border: 1px solid #e8e8e4; background: #fff; color: #1a1a1a; cursor: pointer; font-weight: 600; outline: none; }
  .refresh-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #e8e8e4; background: transparent; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  
  /* Floating Bottom Nav with Sliding Animation */
  .floating-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border-radius: 30px; display: flex; align-items: center; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100; width: 260px; height: 50px; }
  .nav-btn { flex: 1; border: none; background: transparent; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; height: 100%; z-index: 2; transition: color 0.3s ease; }
  .nav-btn.active { color: #fff; }
  .nav-slider { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: rgba(255,255,255,0.15); border-radius: 25px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; }

  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }
  .view-section { display: none; }
  .view-section.active { display: block; }

  /* Metrics Grid */
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width: 480px) {
    .metric-grid.home-grid { grid-template-columns: repeat(2, 1fr); }
    .metric-grid.home-grid .balance-card { grid-column: span 2; }
    .metric-grid.analytics-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .metric { background: #fff; border-radius: 14px; padding: 1rem 0.75rem; border: 1px solid #e8e8e4; text-align: center; }
  .metric-label { font-size: 10px; color: #888; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
  .metric-val { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .metric-sub { font-size: 10px; color: #aaa; margin-top: 4px; font-weight: 600; }
  .metric.crystal-ball { background: radial-gradient(circle at 85% 15%, #fff 0%, #faf9fc 60%, #f5f0ff 100%); border-color: #e1d8ff; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; justify-content: center; }
  @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; max-width: 480px; margin-left: auto; margin-right: auto; } }

  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e4; padding: 1.25rem; width: 100%; }
  .card-title { font-size: 12px; font-weight: 700; margin-bottom: 14px; color: #333; text-transform: uppercase; }
  
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; font-weight: 600; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .cat-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .cat-name { font-size: 12px; color: #666; width: 90px; overflow: hidden; white-space: nowrap; }
  .cat-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #f2f2ee; }
  .cat-bar-fill { height: 100%; border-radius: 3px; }
  .cat-amt { font-size: 12px; font-weight: 700; width: 70px; text-align: right; }

  .date-group-header { font-size: 11px; font-weight: 800; color: #888; margin: 1.5rem 0 0.5rem 0.25rem; text-transform: uppercase; }
  .txn-list { border-radius: 14px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 1.25rem; border-bottom: 1px solid #f5f5f0; }
  .txn-row:last-child { border-bottom: none; }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: 700; border: 1px solid; text-transform: uppercase; }
  .txn-desc { font-size: 13px; font-weight: 600; }
  .txn-amt { font-size: 13px; font-weight: 700; }

  @media (prefers-color-scheme: dark) {
    body { background: #141412; color: #e3e3df; }
    .header, .metric, .card, .txn-list, .month-select { background: #1e1e1c; border-color: #2c2c2a; color: #e3e3df; }
    .floating-nav { background: #262624; }
    .txn-row { border-color: #2c2c2a; }
    .txn-desc { color: #e3e3df; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">Project Alfred</div>
    <select id="month-select-element" class="month-select" onchange="handleMonthDropdown(this.value)"></select>
  </div>
  <button class="refresh-btn" onclick="init()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 1 1 0 6M20.49 15a9 9 0 1 1 0-6"/></svg>
  </button>
</div>

<div class="floating-nav">
  <div id="nav-slider" class="nav-slider"></div>
  <button class="nav-btn active" id="tab-home" onclick="switchView('home')">Home</button>
  <button class="nav-btn" id="tab-analytics" onclick="switchView('analytics')">Analytics</button>
</div>

<div class="container">
  <div id="home-view" class="view-section active">
    <div id="home-metrics" class="metric-grid home-grid"></div>
    <div id="home-timeline"></div>
  </div>

  <div id="analytics-view" class="view-section">
    <div id="analytics-metrics" class="metric-grid analytics-grid"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Cumulative Spend</div>
        <div style="position:relative; width:100%; height:200px"><canvas id="cumulative-line"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div class="legend" id="donut-legend"></div>
        <div style="position:relative; width:100%; height:160px"><canvas id="donut"></canvas></div>
      </div>
    </div>
    <div class="card"><div class="card-title">Category Breakdown</div><div id="bar-breakdown"></div></div>
  </div>
</div>

<script>
const SHEET_ID = "19_C3gFlY7hDjGm87k3Uke63_Tgg6TQPl6xLiGZvuEis";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

const CAT_COLORS = {
  "Food & Dining":     { hex: "#00C853", light: "#E8F5E9" },
  "Transport":         { hex: "#2979FF", light: "#E3F2FD" },
  "Bills & Utilities": { hex: "#FF9100", light: "#FFF3E0" },
  "Shopping":          { hex: "#FF1744", light: "#FCE4EC" },
  "Groceries":         { hex: "#651FFF", light: "#EDE7F6" },
  "Entertainment":     { hex: "#FF3D00", light: "#FBE9E7" },
  "Other":             { hex: "#78909C", light: "#ECEFF1" }
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let allRows = [], activeMonth = new Date().getMonth(), activeYear = new Date().getFullYear(), currentView = 'home';
let donutChart = null, lineChart = null;

async function init() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(", "").replace(");", ""));
  allRows = json.table.rows.filter(r => r.c[0]?.v && r.c[1]?.v).map(r => ({
    Date: r.c[0].v.replace("Date(", "").replace(")", "").split(",").map((v,i) => i===1 ? String(Number(v)+1).padStart(2,"0") : String(v).padStart(2,"0")).join("-"),
    Amount: Number(r.c[1].v),
    Category: r.c[2]?.v || "Other",
    Description: r.c[3]?.v || "",
    Type: r.c[5]?.v ? String(r.c[5].v).trim() : "Expense"
  }));
  renderDropdownOptions();
  calculateAndRender();
}

function switchView(view) {
  window.scrollTo(0,0);
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${view}`).classList.add('active');
  document.getElementById(`${view}-view`).classList.add('active');
  document.getElementById('nav-slider').style.transform = (view === 'analytics') ? 'translateX(100%)' : 'translateX(0)';
  calculateAndRender();
}

function renderDropdownOptions() {
  const now = new Date();
  let html = '';
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    html += `<option value="${d.getFullYear()}-${d.getMonth()}" ${d.getMonth()===activeMonth ? 'selected':''}>${MONTHS[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  document.getElementById('month-select-element').innerHTML = html;
}

function handleMonthDropdown(val) {
  const [yr, mo] = val.split('-');
  activeYear = parseInt(yr); activeMonth = parseInt(mo);
  calculateAndRender();
}

function calculateAndRender() {
  const rows = allRows.filter(r => { const d = new Date(r.Date); return d.getMonth() === activeMonth && d.getFullYear() === activeYear; });
  const totalIncome = rows.filter(r => r.Type === "Income").reduce((s, r) => s + r.Amount, 0);
  const totalExpense = rows.filter(r => r.Type !== "Income").reduce((s, r) => s + r.Amount, 0);
  const netBalance = totalIncome - totalExpense;

  if (currentView === 'home') {
    document.getElementById('home-metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Income</div><div class="metric-val" style="color:#00C853">RM ${totalIncome.toFixed(2)}</div></div>
      <div class="metric"><div class="metric-label">Expenses</div><div class="metric-val" style="color:#FF1744">RM ${totalExpense.toFixed(2)}</div></div>
      <div class="metric balance-card"><div class="metric-label">Net Balance</div><div class="metric-val" style="color:${netBalance>=0?'#00C853':'#FF1744'}">RM ${netBalance.toFixed(2)}</div></div>
    `;
    const sorted = [...rows].sort((a,b) => new Date(b.Date)-new Date(a.Date));
    const groups = {};
    sorted.forEach(r => { 
        const date = new Date(r.Date).toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
        if(!groups[date]) groups[date]=[]; groups[date].push(r); 
    });
    document.getElementById('home-timeline').innerHTML = Object.entries(groups).map(([d, items]) => `
      <div class="date-group-header">${d}</div>
      <div class="txn-list">${items.map(r => `
        <div class="txn-row">
          <div class="txn-left"><span class="badge ${r.Type==='Income'?'inc-badge':'exp-badge'}">${r.Type==='Income'?'Income':r.Category.split(' ')[0]}</span><div class="txn-desc">${r.Description}</div></div>
          <span class="txn-amt" style="color:${r.Type==='Income'?'#00C853':'#1a1a1a'}">${r.Type==='Income'?'+':''}RM ${r.Amount.toFixed(2)}</span>
        </div>`).join('')}</div>`).join('');
  } else {
    const daysElapsed = new Date().getDate();
    const dailyBurn = totalExpense / (new Date().getMonth() === activeMonth ? daysElapsed : 1);
    document.getElementById('analytics-metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Avg Daily Spend</div><div class="metric-val" style="color:#FF1744">RM ${dailyBurn.toFixed(2)}</div></div>
      <div class="metric crystal-ball"><div class="metric-label" style="color:#651FFF">🔮 Forecasted</div><div class="metric-val" style="color:#4A148C">RM ${(dailyBurn * 30).toFixed(2)}</div></div>
    `;
    // (Chart logic remains same as previous iteration, ensure your IDs match)
  }
}
init();
</script>
</body>
</html>
