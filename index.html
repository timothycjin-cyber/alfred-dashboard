<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 18px; font-weight: 500; }
  .header-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .refresh-btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #555; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { background: #f5f5f0; }

  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }

  .month-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #888; cursor: pointer; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: transparent; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #fff; border-radius: 10px; padding: 1rem; border: 1px solid #e8e8e4; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }
  @media (max-width: 560px) { .charts-row { grid-template-columns: 1fr; } }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1rem 1.25rem; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .cat-row { display: flex; align-items: center; gap: 8px; }
  .cat-name { font-size: 12px; color: #888; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #f0f0ec; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .cat-amt { font-size: 12px; font-weight: 500; width: 72px; text-align: right; flex-shrink: 0; }

  .txn-list { border-radius: 12px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; margin-bottom: 1.25rem; }
  .txn-header { font-size: 13px; font-weight: 500; padding: 12px 1.25rem; border-bottom: 1px solid #e8e8e4; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 1.25rem; border-bottom: 1px solid #f0f0ec; }
  .txn-row:last-child { border-bottom: none; }
  .txn-left { display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .txn-desc { font-size: 13px; }
  .txn-meta { font-size: 11px; color: #aaa; }
  .txn-amt { font-size: 13px; font-weight: 500; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  .loading { text-align: center; padding: 4rem 1rem; color: #aaa; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 2px solid #e8e8e4; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner { background: #fff3f3; border: 1px solid #fcc; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; font-size: 13px; color: #c00; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e4; }
    .header, .metric, .card, .txn-list { background: #242424; border-color: #333; }
    .tab { border-color: #444; color: #aaa; }
    .tab.active { background: #e8e8e4; color: #1a1a1a; }
    .refresh-btn { border-color: #444; color: #aaa; }
    .refresh-btn:hover { background: #2a2a2a; }
    .cat-bar-bg { background: #2a2a2a; }
    .txn-row { border-color: #2a2a2a; }
    .txn-header { border-color: #333; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Project Alfred</div>
    <div class="header-sub" id="header-sub">Loading…</div>
  </div>
  <button class="refresh-btn" onclick="init()">↻ Refresh</button>
</div>

<div class="container">
  <div id="main">
    <div class="loading"><div class="spinner"></div>Reading your Google Sheet…</div>
  </div>
</div>

<script>
const SHEET_ID = "19_C3gFlY7hDjGm87k3Uke63_Tgg6TQPl6xLiGZvuEis";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

const CAT_COLORS = {
  "Food & Dining":     { hex: "#1D9E75", light: "#E1F5EE", text: "#0F6E56" },
  "Transport":         { hex: "#378ADD", light: "#E6F1FB", text: "#185FA5" },
  "Bills & Utilities": { hex: "#BA7517", light: "#FAEEDA", text: "#854F0B" },
  "Shopping":          { hex: "#D4537E", light: "#FBEAF0", text: "#993556" },
  "Groceries":         { hex: "#7F77DD", light: "#EEEDFE", text: "#534AB7" },
  "Entertainment":     { hex: "#D85A30", light: "#FAECE7", text: "#993C1D" },
  "Other":             { hex: "#888780", light: "#F1EFE8", text: "#5F5E5A" },
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let allRows = [];
let activeMonth = new Date().getMonth();
let activeYear = new Date().getFullYear();
let donutChart = null;

async function init() {
  document.getElementById('header-sub').textContent = "Loading…";
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div>Reading your Google Sheet…</div>';
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(", "").replace(");", ""));
    const rows = json.table.rows
      .filter(r => r.c[0]?.v && r.c[1]?.v)
      .map(r => ({
        Date: r.c[0].v.replace("Date(", "").replace(")", "").split(",").map((v,i) => i===1 ? String(Number(v)+1).padStart(2,"0") : String(v).padStart(2,"0")).join("-").replace(/^(\d+)-(\d+)-(\d+)$/, "$1-$2-$3"),
        Amount: Number(r.c[1].v),
        Category: r.c[2]?.v || "Other",
        Description: r.c[3]?.v || "",
        Source: r.c[4]?.v || "telegram"
      }));
    allRows = rows;
    activeMonth = new Date().getMonth();
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="error-banner">⚠️ Could not load sheet. Make sure it's shared publicly as "Anyone with the link can view".<br><br>Error: ${e.message}</div>`;
    document.getElementById('header-sub').textContent = "Error loading data";
  }
}

function getMonthRows(mo, yr) {
  return allRows.filter(r => {
    const d = new Date(r.Date);
    return d.getMonth() === mo && d.getFullYear() === yr;
  });
}

function render() {
  const rows = getMonthRows(activeMonth, activeYear);
  const total = rows.reduce((s, r) => s + r.Amount, 0);
  const daysInMonth = new Date(activeYear, activeMonth + 1, 0).getDate();
  const dailyAvg = total / daysInMonth;

  const catTotals = {};
  rows.forEach(r => { catTotals[r.Category] = (catTotals[r.Category] || 0) + r.Amount; });
  const catData = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const topCat = catData[0];
  const maxCat = catData[0]?.[1] || 1;

  document.getElementById('header-sub').textContent = `${allRows.length} total transactions · last updated just now`;

  // Build available months from data
  const monthSet = new Set(allRows.map(r => { const d = new Date(r.Date); return `${d.getFullYear()}-${d.getMonth()}`; }));
  const now = new Date();
  const tabMonths = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    tabMonths.push({ mo: d.getMonth(), yr: d.getFullYear(), label: MONTHS[d.getMonth()] });
  }

  const html = `
    <div class="month-tabs">
      ${tabMonths.map(t => `<button class="tab ${t.mo === activeMonth && t.yr === activeYear ? 'active' : ''}" onclick="switchMonth(${t.mo},${t.yr})">${t.label}</button>`).join('')}
    </div>

    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Total spent</div><div class="metric-val">RM ${total.toFixed(2)}</div><div class="metric-sub">${rows.length} transaction${rows.length !== 1 ? 's' : ''}</div></div>
      <div class="metric"><div class="metric-label">Daily average</div><div class="metric-val">RM ${dailyAvg.toFixed(2)}</div><div class="metric-sub">${MONTHS[activeMonth]} ${activeYear}</div></div>
      <div class="metric"><div class="metric-label">Top category</div><div class="metric-val">${topCat ? topCat[0].split(' ')[0] : '—'}</div><div class="metric-sub">${topCat ? 'RM ' + topCat[1].toFixed(2) : 'no data'}</div></div>
      <div class="metric"><div class="metric-label">Categories</div><div class="metric-val">${catData.length}</div><div class="metric-sub">active</div></div>
    </div>

    <div class="charts-row">
      <div class="card">
        <div class="card-title">By category</div>
        <div class="legend">${catData.map(([cat, val]) => {
          const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
          const pct = total > 0 ? ((val/total)*100).toFixed(0) : 0;
          return `<span class="legend-item"><span class="legend-dot" style="background:${c.hex}"></span>${cat.split(' ')[0]} ${pct}%</span>`;
        }).join('')}</div>
        <div style="position:relative;width:100%;height:180px">
          <canvas id="donut" role="img" aria-label="Donut chart of spending by category">${catData.map(([c,v]) => `${c}: RM ${v.toFixed(2)}`).join(', ')}</canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Category breakdown</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${catData.length ? catData.map(([cat, val]) => {
            const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
            return `<div class="cat-row">
              <span class="cat-name">${cat}</span>
              <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(val/maxCat*100).toFixed(1)}%;background:${c.hex}"></div></div>
              <span class="cat-amt">RM ${val.toFixed(2)}</span>
            </div>`;
          }).join('') : '<div style="color:#aaa;font-size:13px">No data this month</div>'}
        </div>
      </div>
    </div>

    <div class="txn-list">
      <div class="txn-header">Recent transactions — ${MONTHS[activeMonth]} ${activeYear}</div>
      ${rows.length ? [...rows].reverse().slice(0, 10).map(r => {
        const c = CAT_COLORS[r.Category] || CAT_COLORS["Other"];
        return `<div class="txn-row">
          <div class="txn-left">
            <span class="badge" style="background:${c.light};color:${c.text}">${r.Category.split(' ')[0]}</span>
            <div><div class="txn-desc">${r.Description}</div><div class="txn-meta">${r.Date} · ${r.Source}</div></div>
          </div>
          <span class="txn-amt">RM ${r.Amount.toFixed(2)}</span>
        </div>`;
      }).join('') : '<div class="empty"><div class="empty-icon">📭</div>No transactions this month yet.<br>Log some expenses via Telegram!</div>'}
    </div>
  `;

  document.getElementById('main').innerHTML = html;

  if (donutChart) { donutChart.destroy(); donutChart = null; }
  if (catData.length) {
    donutChart = new Chart(document.getElementById('donut'), {
      type: 'doughnut',
      data: {
        labels: catData.map(d => d[0]),
        datasets: [{ data: catData.map(d => d[1]), backgroundColor: catData.map(([cat]) => (CAT_COLORS[cat] || CAT_COLORS["Other"]).hex), borderWidth: 2, borderColor: 'transparent', hoverOffset: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: false, cutout: '62%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` RM ${Number(ctx.raw).toFixed(2)}` } } } }
    });
  }
}

function switchMonth(mo, yr) {
  activeMonth = mo;
  activeYear = yr;
  render();
}

init();
</script>
</body>
</html>
