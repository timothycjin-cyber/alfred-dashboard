<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Alfred — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  .header { background: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 18px; font-weight: 500; }
  .header-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .refresh-btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #555; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { background: #f5f5f0; }

  /* Navigation Bar Interface */
  .nav-bar { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 0 1.5rem; display: flex; gap: 24px; }
  .nav-tab { background: none; border: none; padding: 1rem 0; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; position: relative; }
  .nav-tab.active { color: #1a1a1a; }
  .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: #1a1a1a; border-radius: 3px 3px 0 0; }

  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem; }

  .month-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #888; cursor: pointer; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: transparent; }

  /* Views State Controllers */
  .view-section { display: none; }
  .view-section.active { display: block; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #fff; border-radius: 10px; padding: 1rem; border: 1px solid #e8e8e4; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }
  @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; padding: 1rem 1.25rem; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .cat-row { display: flex; align-items: center; gap: 8px; }
  .cat-name { font-size: 12px; color: #888; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #f0f0ec; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .cat-amt { font-size: 12px; font-weight: 500; width: 72px; text-align: right; flex-shrink: 0; }

  /* Grouped Transaction Layout */
  .date-group-header { font-size: 13px; font-weight: 600; color: #555; margin: 1.5rem 0 0.5rem 0.25rem; }
  .txn-list { border-radius: 12px; border: 1px solid #e8e8e4; background: #fff; overflow: hidden; margin-bottom: 0.5rem; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 1.25rem; border-bottom: 1px solid #f0f0ec; }
  .txn-row:last-child { border-bottom: none; }
  .txn-left { display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .txn-desc { font-size: 13px; font-weight: 500; }
  .txn-meta { font-size: 11px; color: #aaa; margin-top: 1px; }
  .txn-amt { font-size: 13px; font-weight: 600; }
  .txn-amt.income { color: #1D9E75; }
  .txn-amt.expense { color: #1a1a1a; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 4rem 1rem; color: #aaa; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 2px solid #e8e8e4; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner { background: #fff3f3; border: 1px solid #fcc; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; font-size: 13px; color: #c00; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e4; }
    .header, .nav-bar, .metric, .card, .txn-list { background: #242424; border-color: #333; }
    .nav-tab.active { color: #e8e8e4; }
    .nav-tab.active::after { background: #e8e8e4; }
    .tab { border-color: #444; color: #aaa; }
    .tab.active { background: #e8e8e4; color: #1a1a1a; }
    .refresh-btn { border-color: #444; color: #aaa; }
    .refresh-btn:hover { background: #2a2a2a; }
    .cat-bar-bg { background: #2a2a2a; }
    .txn-row { border-color: #2a2a2a; }
    .date-group-header { color: #aaa; }
    .txn-amt.expense { color: #e8e8e4; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Project Alfred</div>
    <div class="header-sub" id="header-sub">Loading…</div>
  </div>
  <button class="refresh-btn" onclick="init()">↻ Refresh</button>
</div>

<div class="nav-bar">
  <button class="nav-tab active" id="tab-home" onclick="switchView('home')">🏠 Home</button>
  <button class="nav-tab" id="tab-analytics" onclick="switchView('analytics')">📈 Analytics</button>
</div>

<div class="container">
  <div id="month-tabs-container"></div>

  <div id="home-view" class="view-section active">
    <div id="home-metrics"></div>
    <div id="home-timeline"></div>
  </div>

  <div id="analytics-view" class="view-section">
    <div id="analytics-metrics"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Cumulative Spend (This Month vs Last Month)</div>
        <div style="position:relative; width:100%; height:240px">
          <canvas id="cumulative-line"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div class="legend" id="donut-legend"></div>
        <div style="position:relative; width:100%; height:180px">
          <canvas id="donut"></canvas>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top: 14px;">
      <div class="card-title">Category Breakdown</div>
      <div style="display:flex; flex-direction:column; gap:12px" id="bar-breakdown"></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "19_C3gFlY7hDjGm87k3Uke63_Tgg6TQPl6xLiGZvuEis";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

const CAT_COLORS = {
  "Food & Dining":     { hex: "#1D9E75", light: "#E1F5EE", text: "#0F6E56" },
  "Transport":         { hex: "#378ADD", light: "#E6F1FB", text: "#185FA5" },
  "Bills & Utilities": { hex: "#BA7517", light: "#FAEEDA", text: "#854F0B" },
  "Shopping":          { hex: "#D4537E", light: "#FBEAF0", text: "#993556" },
  "Groceries":         { hex: "#7F77DD", light: "#EEEDFE", text: "#534AB7" },
  "Entertainment":     { hex: "#D85A30", light: "#FAECE7", text: "#993C1D" },
  "Other":             { hex: "#888780", light: "#F1EFE8", text: "#5F5E5A" }
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let allRows = [];
let activeMonth = new Date().getMonth();
let activeYear = new Date().getFullYear();
let currentView = 'home';

let donutChart = null;
let lineChart = null;

async function init() {
  document.getElementById('header-sub').textContent = "Loading…";
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace("/*O_o*/\ngoogle.visualization.Query.setResponse(", "").replace(");", ""));
    allRows = json.table.rows
      .filter(r => r.c[0]?.v && r.c[1]?.v)
      .map(r => ({
        Date: r.c[0].v.replace("Date(", "").replace(")", "").split(",").map((v,i) => i===1 ? String(Number(v)+1).padStart(2,"0") : String(v).padStart(2,"0")).join("-"),
        Amount: Number(r.c[1].v),
        Category: r.c[2]?.v || "Other",
        Description: r.c[3]?.v || "",
        Source: r.c[4]?.v || "telegram",
        Type: r.c[5]?.v ? String(r.c[5].v).trim() : "Expense"
      }));
    renderTabs();
    calculateAndRender();
  } catch(e) {
    document.getElementById('home-view').innerHTML = `<div class="error-banner">⚠️ Could not read Google Sheet data.<br>Error: ${e.message}</div>`;
    document.getElementById('header-sub').textContent = "Error loading connection paths";
  }
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  
  document.getElementById(`tab-${view}`).classList.add('active');
  document.getElementById(`${view}-view`).classList.add('active');
  
  calculateAndRender();
}

function renderTabs() {
  const now = new Date();
  const tabMonths = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    tabMonths.push({ mo: d.getMonth(), yr: d.getFullYear(), label: MONTHS[d.getMonth()] });
  }
  
  document.getElementById('month-tabs-container').innerHTML = `
    <div class="month-tabs">
      ${tabMonths.map(t => `<button class="tab ${t.mo === activeMonth && t.yr === activeYear ? 'active' : ''}" onclick="switchMonth(${t.mo},${t.yr})">${t.label}</button>`).join('')}
    </div>
  `;
}

function switchMonth(mo, yr) {
  activeMonth = mo;
  activeYear = yr;
  renderTabs();
  calculateAndRender();
}

function calculateAndRender() {
  document.getElementById('header-sub').textContent = `${allRows.length} total transactions found`;

  const rows = allRows.filter(r => {
    const d = new Date(r.Date);
    return d.getMonth() === activeMonth && d.getFullYear() === activeYear;
  });

  const totalIncome = rows.filter(r => r.Type === "Income").reduce((s, r) => s + r.Amount, 0);
  const totalExpense = rows.filter(r => r.Type !== "Income").reduce((s, r) => s + r.Amount, 0);
  const netBalance = totalIncome - totalExpense;

  const expenseRows = rows.filter(r => r.Type !== "Income");
  const catTotals = {};
  expenseRows.forEach(r => { catTotals[r.Category] = (catTotals[r.Category] || 0) + r.Amount; });
  const catData = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const maxCat = catData[0]?.[1] || 1;

  // ── HOME VIEW RENDERER ──
  if (currentView === 'home') {
    const balanceCheekySub = netBalance >= 0 ? "In the green! 🎉" : "Watching the leak ⚠️";
    document.getElementById('home-metrics').innerHTML = `
      <div class="metric-grid">
        <div class="metric">
          <div class="metric-label">Income</div>
          <div class="metric-val" style="color: #1D9E75;">RM ${totalIncome.toFixed(2)}</div>
          <div class="metric-sub">${rows.filter(r => r.Type === "Income").length} entries logged</div>
        </div>
        <div class="metric">
          <div class="metric-label">Expenses</div>
          <div class="metric-val">RM ${totalExpense.toFixed(2)}</div>
          <div class="metric-sub">${expenseRows.length} entries logged</div>
        </div>
        <div class="metric">
          <div class="metric-label">Net Balance</div>
          <div class="metric-val" style="color: ${netBalance >= 0 ? '#1D9E75' : '#D4537E'};">RM ${netBalance.toFixed(2)}</div>
          <div class="metric-sub">${balanceCheekySub}</div>
        </div>
      </div>
    `;

    if (!rows.length) {
      document.getElementById('home-timeline').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No transactions this month yet.</div>';
    } else {
      const sortedRows = [...rows].sort((a, b) => new Date(b.Date) - new Date(a.Date));
      const groups = {};
      sortedRows.forEach(r => {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateHeader = new Date(r.Date).toLocaleDateString('en-US', options);
        if (!groups[dateHeader]) groups[dateHeader] = [];
        groups[dateHeader].push(r);
      });

      let timelineHtml = '';
      for (const [dateStr, records] of Object.entries(groups)) {
        timelineHtml += `<div class="date-group-header">${dateStr}</div><div class="txn-list">`;
        timelineHtml += records.map(r => {
          const isInc = r.Type === "Income";
          const c = CAT_COLORS[r.Category] || CAT_COLORS["Other"];
          return `
            <div class="txn-row">
              <div class="txn-left">
                <span class="badge" style="background:${isInc ? '#E1F5EE' : c.light}; color:${isInc ? '#0F6E56' : c.text}; border: ${isInc ? '1px solid #1D9E75' : 'none'}">
                  ${isInc ? 'Income' : r.Category.split(' ')[0]}
                </span>
                <div>
                  <div class="txn-desc">${r.Description}</div>
                  <div class="txn-meta">via ${r.Source}</div>
                </div>
              </div>
              <span class="txn-amt ${isInc ? 'income' : 'expense'}">
                ${isInc ? '+' : ''}RM ${r.Amount.toFixed(2)}
              </span>
            </div>
          `;
        }).join('');
        timelineHtml += `</div>`;
      }
      document.getElementById('home-timeline').innerHTML = timelineHtml;
    }
  }

  // ── ANALYTICS VIEW RENDERER ──
  if (currentView === 'analytics') {
    const today = new Date();
    const daysInMonth = new Date(activeYear, activeMonth + 1, 0).getDate();
    const isCurrentMonth = (activeMonth === today.getMonth() && activeYear === today.getFullYear());
    const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;
    const percentageElapsed = Math.round((daysElapsed / daysInMonth) * 100);

    const dailyBurnRate = daysElapsed > 0 ? (totalExpense / daysElapsed) : 0;
    const projectedEndSpend = dailyBurnRate * daysInMonth;

    const burnCheekySub = dailyBurnRate > 100 ? "A bit of a splurge? 💸" : "Keeping it chill 🧊";

    document.getElementById('analytics-metrics').innerHTML = `
      <div class="metric-grid">
        <div class="metric">
          <div class="metric-label">Average Daily Spend</div>
          <div class="metric-val">RM ${dailyBurnRate.toFixed(2)}/day</div>
          <div class="metric-sub">${burnCheekySub}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Days Elapsed</div>
          <div class="metric-val">${percentageElapsed}%</div>
          <div class="metric-sub">Survival rate: ${daysElapsed} of ${daysInMonth} days passed</div>
        </div>
        <div class="metric">
          <div class="metric-label">Projected Month-End Spend</div>
          <div class="metric-val" style="color: #BA7517;">RM ${projectedEndSpend.toFixed(2)}</div>
          <div class="metric-sub">Where you're landing 🛬</div>
        </div>
      </div>
    `;

    document.getElementById('donut-legend').innerHTML = catData.map(([cat, val]) => {
      const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
      const pct = totalExpense > 0 ? ((val / totalExpense) * 100).toFixed(0) : 0;
      return `<span class="legend-item"><span class="legend-dot" style="background:${c.hex}"></span>${cat.split(' ')[0]} ${pct}%</span>`;
    }).join('');

    document.getElementById('bar-breakdown').innerHTML = catData.length ? catData.map(([cat, val]) => {
      const c = CAT_COLORS[cat] || CAT_COLORS["Other"];
      return `
        <div class="cat-row">
          <span class="cat-name">${cat}</span>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(val / maxCat * 100).toFixed(1)}%; background:${c.hex}"></div></div>
          <span class="cat-amt">RM ${val.toFixed(2)}</span>
        </div>
      `;
    }).join('') : '<div style="color:#aaa; font-size:13px; padding: 10px;">No expenses for this period.</div>';

    if (donutChart) donutChart.destroy();
    if (catData.length) {
      donutChart = new Chart(document.getElementById('donut'), {
        type: 'doughnut',
        data: {
          labels: catData.map(d => d[0]),
          datasets: [{ data: catData.map(d => d[1]), backgroundColor: catData.map(([cat]) => (CAT_COLORS[cat] || CAT_COLORS["Other"]).hex), borderWidth: 2, borderColor: 'transparent' }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false } } }
      });
    }

    // Cumulative Line Chart Assembly
    let lastMo = activeMonth - 1;
    let lastYr = activeYear;
    if (lastMo < 0) { lastMo = 11; lastYr -= 1; }

    const lastMonthExpenseRows = allRows.filter(r => {
      const d = new Date(r.Date);
      return d.getMonth() === lastMo && d.getFullYear() === lastYr && r.Type !== "Income";
    });

    const timelineLabels = Array.from({ length: daysInMonth }, (_, i) => i + 1);
    
    let currentSum = 0;
    const currentMonthlyCumulativeData = [];
    for (let day = 1; day <= daysInMonth; day++) {
      if (isCurrentMonth && day > today.getDate()) break;
      const dayExpenses = expenseRows.filter(r => new Date(r.Date).getDate() === day);
      currentSum += dayExpenses.reduce((s, r) => s + r.Amount, 0);
      currentMonthlyCumulativeData.push(currentSum);
    }

    let lastSum = 0;
    const priorMonthlyCumulativeData = [];
    const daysInLastMonth = new Date(lastYr, lastMo + 1, 0).getDate();
    for (let day = 1; day <= daysInMonth; day++) {
      if (day <= daysInLastMonth) {
        const dayExpenses = lastMonthExpenseRows.filter(r => new Date(r.Date).getDate() === day);
        lastSum += dayExpenses.reduce((s, r) => s + r.Amount, 0);
      }
      priorMonthlyCumulativeData.push(lastSum);
    }

    if (lineChart) lineChart.destroy();
    lineChart = new Chart(document.getElementById('cumulative-line'), {
      type: 'line',
      data: {
        labels: timelineLabels,
        datasets: [
          { label: 'This Month', data: currentMonthlyCumulativeData, borderColor: '#1D9E75', backgroundColor: 'transparent', borderWidth: 3, pointRadius: 2, tension: 0.1 },
          { label: 'Last Month', data: priorMonthlyCumulativeData, borderColor: '#aaa', backgroundColor: 'transparent', borderWidth: 2, borderDash: [6, 6], pointRadius: 0, tension: 0.1 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: {
          x: { grid: { display: false }, title: { display: true, text: 'Day of Month', font: { size: 10 } } },
          y: { beginAtZero: true, title: { display: true, text: 'Cumulative (RM)', font: { size: 10 } } }
        }
      }
    });
  }
}

init();
</script>
</body>
</html>
